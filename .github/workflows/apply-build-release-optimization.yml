name: Apply build and release optimization source

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/maintenance/build_opt_parts/**'
      - 'scripts/maintenance/build_opt_chunks/**'
      - 'scripts/maintenance/build_opt_fixed/**'
      - '.github/workflows/apply-build-release-optimization.yml'

permissions:
  contents: write

concurrency:
  group: scbl-apply-build-release-optimization
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Reconstruct optimized build payload
        shell: bash
        run: |
          set -euo pipefail
          {
            cat scripts/maintenance/build_opt_fixed/chunk00_*.b64
            cat scripts/maintenance/build_opt_fixed/chunk01_*.b64
            cat scripts/maintenance/build_opt_chunks/chunk02.b64
            cat scripts/maintenance/build_opt_fixed/chunk03_*.b64
            cat scripts/maintenance/build_opt_chunks/chunk04.b64
            cat scripts/maintenance/build_opt_chunks/chunk05.b64
            cat scripts/maintenance/build_opt_chunks/chunk06.b64
          } > /tmp/scbl-build-opt.b64
          echo '6acc04dba824a5200b7aa840e774db6254d6ad68f21d6710a8b9a6cf6c1ab8b8  /tmp/scbl-build-opt.b64' | sha256sum -c -
          base64 -d /tmp/scbl-build-opt.b64 > /tmp/scbl-build-opt.tar.gz
          echo '40203f66f7fef7cb0a950d27c0534feb8a053d4944f5e4649862e2887efeb3a9  /tmp/scbl-build-opt.tar.gz' | sha256sum -c -

      - name: Apply optimized build source and release routing
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/scbl-build-opt.tar.gz -C .
          python3 apply_server_patch.py
          rm -f apply_server_patch.py

      - name: Validate generated source
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/install-server.sh
          bash -n server/install_public_server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re
          manager = Path('server/install_public_server.sh').read_text(encoding='utf-8')
          bootstrap = Path('scripts/install-server.sh').read_text(encoding='utf-8')
          assert 'release_tag="$(manifest_value "$manifest" releaseTag)"' in manager
          assert 'SCBL_CLIENT_PACKAGE_BASE_URL' in manager
          assert 'SCBL_SERVER_TOOL_PACKAGE_BASE_URL' in manager
          assert 'release_tag="$(manifest_value releaseTag)"' in bootstrap
          assert 'SCBL_PACKAGE_BASE_URL' in bootstrap
          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              for marker, source in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
                  compile(source, f'{path}:{marker}', 'exec')
          PY
          pwsh -NoProfile -Command '$ErrorActionPreference="Stop"; $files=@("client/build_all_windows.ps1","client/create_client_full_package.ps1","client/easytier/download_easytier_windows.ps1"); foreach($file in $files){$tokens=$null;$errors=$null;[void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file),[ref]$tokens,[ref]$errors);if($errors.Count -gt 0){throw "$file parse error: $($errors[0].Message)"}}'
          git diff --check

      - name: Commit optimized source to PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scripts/maintenance/build_opt_parts \
                 scripts/maintenance/build_opt_chunks \
                 scripts/maintenance/build_opt_fixed
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add client/build_all_windows.ps1 \
                  client/create_client_full_package.ps1 \
                  client/easytier/download_easytier_windows.ps1 \
                  scripts/install-server.sh \
                  server/install_public_server.sh \
                  server/test_release_manifest_routing.py \
                  scripts/maintenance/build_opt_parts \
                  scripts/maintenance/build_opt_chunks \
                  scripts/maintenance/build_opt_fixed
          git commit -m 'Optimize incremental builds and manifest release routing'
          git push origin "HEAD:${HEAD_REF}"
