name: Apply build and release optimization source

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/maintenance/build_opt_parts/**'
      - '.github/workflows/apply-build-release-optimization.yml'

permissions:
  contents: write

concurrency:
  group: scbl-apply-build-release-optimization
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply optimized build source and release routing
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/maintenance/build_opt_parts/*.b64 | base64 -d > /tmp/scbl-build-opt.tar.gz
          tar -xzf /tmp/scbl-build-opt.tar.gz -C .
          python3 apply_server_patch.py
          rm -f apply_server_patch.py

      - name: Validate generated source
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/install-server.sh
          bash -n server/install_public_server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re
          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              for marker, source in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
                  compile(source, f'{path}:{marker}', 'exec')
          PY
          python3 server/test_release_manifest_routing.py
          pwsh -NoProfile -Command '$ErrorActionPreference="Stop"; $files=@("client/build_all_windows.ps1","client/create_client_full_package.ps1","client/easytier/download_easytier_windows.ps1"); foreach($file in $files){$tokens=$null;$errors=$null;[void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file),[ref]$tokens,[ref]$errors);if($errors.Count -gt 0){throw "$file parse error: $($errors[0].Message)"}}'
          git diff --check

      - name: Commit optimized source to PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf scripts/maintenance/build_opt_parts
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add client/build_all_windows.ps1 \
                  client/create_client_full_package.ps1 \
                  client/easytier/download_easytier_windows.ps1 \
                  scripts/install-server.sh \
                  server/install_public_server.sh \
                  server/test_release_manifest_routing.py \
                  scripts/maintenance/build_opt_parts
          git commit -m 'Optimize incremental builds and manifest release routing'
          git push origin "HEAD:${HEAD_REF}"
