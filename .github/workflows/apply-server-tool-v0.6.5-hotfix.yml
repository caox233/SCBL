name: Apply SCBL server tool v0.6.5 bootstrap hotfix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-server-tool-v0.6.5-hotfix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Bump server tool metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          manager = Path('server/install_public_server.sh')
          text = manager.read_text(encoding='utf-8')
          old = 'SERVER_TOOL_VERSION="0.6.4"'
          new = 'SERVER_TOOL_VERSION="0.6.5"'
          if old not in text:
              raise SystemExit('expected server-tool version anchor not found')
          manager.write_text(text.replace(old, new, 1), encoding='utf-8')

          Path('VERSION_SERVER_TOOL').write_text('0.6.5\n', encoding='utf-8')

          component_path = Path('COMPONENT_VERSIONS.json')
          component = json.loads(component_path.read_text(encoding='utf-8'))
          component['serverToolVersion'] = '0.6.5'
          component_path.write_text(json.dumps(component, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text(encoding='utf-8')
          section = '''\n## Server Tool v0.6.5\n\n- Fixed the piped bootstrap installer appearing to hang after downloading checksums.\n- Added bounded download and validation timeouts with visible stage messages.\n- Reattached the downloaded manager explicitly to `/dev/tty` before entering the interactive menu.\n\n'''
          if '## Server Tool v0.6.5' not in changelog:
              heading, remainder = changelog.split('\n', 1)
              changelog_path.write_text(heading + '\n' + section + remainder, encoding='utf-8')

          Path('docs/releases/SERVER_TOOL_v0.6.5.md').write_text('''# SCBL Server Tool v0.6.5\n\nThis is a server-tool-only bootstrap reliability hotfix. It does not rebuild or change the Windows client.\n\n## Changes\n\n- Adds explicit progress messages between package download, checksum verification, extraction and manager startup.\n- Adds maximum execution times to GitHub downloads and local validation steps.\n- Opens `/dev/tty` explicitly and connects the downloaded interactive manager to it when the bootstrap is executed through `curl | sudo bash`.\n- Preserves configuration, database, client update data, incoming files, backups and DDNS-GO settings.\n''', encoding='utf-8')
          PY

          bash -n server/install_public_server.sh
          grep -Fq 'SERVER_TOOL_VERSION="0.6.5"' server/install_public_server.sh
          test "$(tr -d '\r\n ' < VERSION_SERVER_TOOL)" = '0.6.5'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server/install_public_server.sh VERSION_SERVER_TOOL COMPONENT_VERSIONS.json CHANGELOG.md docs/releases/SERVER_TOOL_v0.6.5.md
          git commit -m 'SCBL Server Tool v0.6.5: bootstrap reliability hotfix'
          git push origin HEAD:main
