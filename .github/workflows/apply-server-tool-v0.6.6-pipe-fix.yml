name: Apply SCBL server tool v0.6.6 pipe-mode fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-server-tool-v0.6.6-pipe-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply v0.6.6 bootstrap fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import json

          new_version = "0.6.6"
          bootstrap_b64 = "   nP1xuKC4qPylcblwxIiwgdGV4dCwgcmUuUykKaWYgbm90IGJsb2NrczoKICAgIHJhaXNlIFN5c3RlbUV4aXQoJ21hbmFnZXIgc2NyaXB0IGhhcyBubyBlbWJlZGRlZCBQeXRob24gaGVyZWRvY3MnKQpmb3IgbWFya2VyLCBibG9jayBpbiBibG9ja3M6CiAgICBjb21waWxlKGJsb2NrLCBmJ3twYXRofTp7bWFya2VyfScsICdleGVjJykKUF  BVYnVudHUgU2VydmVyIOS4reaVsOaNruaMh+WHhuWFpeaJgOW8leWPkeS6p+S6kuaAp+a1j+iniOmTiuaXoOaYvuekuO+8jOacrOasoeS4jeWcqOeuoemBk+WGheWQr+WKqOiPnOWNleOAgiIKZWNobyAiW1NDQkxdIOivt+WcqOW9k+WJjeaVsOaNruaMh+WPkeeahOe7iOerr+e7p+e7reaJp+ihjO+8miIKZWNobwplY2hvICIgIFNDQkwiCmVjaG8KZXhpdCAwCg=="

          Path("scripts/install-server.sh").write_bytes(base64.b64decode(bootstrap_b64))

          manager_path = Path("server/install_public_server.sh")
          manager = manager_path.read_text(encoding="utf-8")
          old = 'SERVER_TOOL_VERSION="0.6.5"'
          new = f'SERVER_TOOL_VERSION="{new_version}"'
          if old not in manager:
              raise SystemExit("expected server tool version anchor not found")
          manager_path.write_text(manager.replace(old, new, 1), encoding="utf-8")

          Path("VERSION_SERVER_TOOL").write_text(new_version + "\n", encoding="utf-8")

          component_path = Path("COMPONENT_VERSIONS.json")
          component = json.loads(component_path.read_text(encoding="utf-8"))
          component["serverToolVersion"] = new_version
          component_path.write_text(
              json.dumps(component, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          changelog_path = Path("CHANGELOG.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          section = '''## Server Tool v0.6.6

          - 修复在 `curl | sudo bash` 管道中启动交互菜单后无显示的问题。
          - 管道模式先安装持久化 `SCBL` 命令并退出，再提示管理员执行 `SCBL`。
          - 直接下载脚本后运行时仍可自动进入交互菜单。
          - 保留下载、校验、解压和脚本检查的进度提示与超时保护。

          '''
          if "## Server Tool v0.6.6" not in changelog:
              marker = "# 更新记录\n\n"
              if marker not in changelog:
                  raise SystemExit("CHANGELOG marker not found")
              changelog = changelog.replace(marker, marker + section, 1)
              changelog_path.write_text(changelog, encoding="utf-8")

          notes = '''# SCBL Server Tool v0.6.6

This server-tool-only hotfix does not rebuild or change the Windows client.

## Changes

- Stops launching the interactive management menu inside `curl | bash` pipelines.
- Installs the persistent `SCBL` command first, then asks pipe-mode users to run `SCBL`.
- Keeps direct downloaded-script execution interactive.
- Adds explicit startup progress and bounded download, extraction and validation timeouts.
- Preserves configuration, database, client update data, incoming files and DDNS-GO settings.
'''
          notes_path = Path("docs/releases/SERVER_TOOL_v0.6.6.md")
          notes_path.parent.mkdir(parents=True, exist_ok=True)
          notes_path.write_text(notes, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          old_command = "curl -fsSL https://github.com/caox233/SCBL/releases/download/server-tool-stable-latest/install-server.sh | sudo bash"
          new_command = "curl -fL https://github.com/caox233/SCBL/releases/download/server-tool-stable-latest/install-server.sh -o /tmp/install-server.sh && sudo bash /tmp/install-server.sh"
          if old_command in readme:
              readme_path.write_text(readme.replace(old_command, new_command), encoding="utf-8")
          PY

          bash -n scripts/install-server.sh
          bash -n server/install_public_server.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scripts/install-server.sh server/install_public_server.sh VERSION_SERVER_TOOL COMPONENT_VERSIONS.json CHANGELOG.md README.md docs/releases/SERVER_TOOL_v0.6.6.md
          git commit -m "SCBL Server Tool v0.6.6: avoid interactive curl pipes"
          git push origin main
