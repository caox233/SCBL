name: Dispatch SCBL Server Tool v0.6.8 Release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-server-tool-v0.6.8-online-fix.yml'

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - name: Verify source version
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Dispatch official publisher
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n ' < VERSION_SERVER_TOOL)" = "0.6.8"
          grep -Fq 'SERVER_TOOL_VERSION="0.6.8"' server/install_public_server.sh
          grep -Fq 'SCBL_SERVER_TOOL_VERSION", "0.6.8"' server/scbl_control_plane.py
          gh workflow run server-tool-release.yml --ref main -f version=0.6.8
          echo 'Official server-tool v0.6.8 publisher dispatched.'
