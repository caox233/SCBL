name: Apply SCBL server tool v0.6.8 online-mode repair

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-server-tool-v0.6.8-online-fix.yml'

permissions:
  contents: write

concurrency:
  group: scbl-server-tool-v068-source
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply online-mode repair
        run: python3 scripts/maintenance/apply_v068_online_service_fix.py

      - name: Remove unsupported DDNS claims from release notes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          notes_path = Path('docs/releases/SERVER_TOOL_v0.6.8.md')
          notes = notes_path.read_text(encoding='utf-8')
          notes = re.sub(r'\n## DDNS-GO\n.*\Z', '\n', notes, count=1, flags=re.S)
          notes_path.write_text(notes, encoding='utf-8')
          PY

      - name: Validate shell and embedded Python
        shell: bash
        run: |
          set -euo pipefail
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re
          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              for marker, source in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
                  compile(source, f'{path}:{marker}', 'exec')
          PY
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py

      - name: Validate generated source and Hooks boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n ' < VERSION_SERVER_TOOL)" = "0.6.8"
          grep -Fq 'SERVER_TOOL_VERSION="0.6.8"' server/install_public_server.sh
          grep -Fq 'generate_dedicated_service_config()' server/install_public_server.sh
          grep -Fq 'repair_dedicated_service_config()' server/install_public_server.sh
          grep -Fq '"auth": udp_bound(21126)' server/scbl_control_plane.py
          grep -Fq '"secure": udp_bound(21127)' server/scbl_control_plane.py
          ! grep -Fq 'Apply v0.6.6 stable IPv6 selector source hotfix' .github/workflows/server-tool-release.yml
          ! grep -Fq '## DDNS-GO' docs/releases/SERVER_TOOL_v0.6.8.md
          if git diff --name-only | grep -Eq '(^|/)(hooks|uplay_r1_loader)(/|\.|$)'; then
            echo 'Hooks files must remain unchanged.' >&2
            exit 1
          fi

      - name: Push generated source branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/maintenance/apply_v067_ddns_go_defaults.py
          rm -f scripts/maintenance/apply_v068_online_service_fix.py
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'SCBL Server Tool v0.6.8: repair online service endpoints'
          git push --force origin HEAD:refs/heads/generated/server-tool-v0.6.8
