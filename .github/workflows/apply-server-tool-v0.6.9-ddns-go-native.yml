name: Generate SCBL Server Tool v0.6.9 source

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/maintenance/v069_parts/**'
      - '.github/workflows/apply-server-tool-v0.6.9-ddns-go-native.yml'

permissions:
  contents: write

concurrency:
  group: scbl-server-tool-v069-generated-source
  cancel-in-progress: false

jobs:
  generate-validate-and-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Generate DDNS-GO native management source
        shell: bash
        run: |
          set -euo pipefail
          current="$(tr -d '\r\n ' < VERSION_SERVER_TOOL)"
          if [[ "$current" != "0.6.9" ]]; then
            cat scripts/maintenance/v069_parts/*.b64 | base64 -d > /tmp/apply_v069_ddns_go_native.py
            python3 -m py_compile /tmp/apply_v069_ddns_go_native.py
            python3 /tmp/apply_v069_ddns_go_native.py

            python3 - <<'PY'
          from pathlib import Path

          path = Path('server/scbl_control_plane.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'SERVER_TOOL_VERSION = os.environ.get("SCBL_SERVER_TOOL_VERSION", "0.6.8").strip()':
                  'SERVER_TOOL_VERSION = os.environ.get("SCBL_SERVER_TOOL_VERSION", "0.6.9").strip()',
              'server_version = "SCBLControlPlane/0.6.4"':
                  'server_version = "SCBLControlPlane/0.6.9"',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'control-plane version replacement mismatch: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          else
            echo 'Server Tool v0.6.9 source is already generated; validating the existing result.'
          fi

      - name: Validate generated source
        shell: bash
        run: |
          set -euo pipefail
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              for marker, source in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
                  compile(source, f'{path}:{marker}', 'exec')
          PY
          python3 -m py_compile \
            server/scbl_control_plane.py \
            server/test_control_plane.py \
            server/test_ddns_go_native.py
          python3 server/test_control_plane.py
          python3 server/test_ddns_go_native.py

          test "$(tr -d '\r\n ' < VERSION_SERVER_TOOL)" = "0.6.9"
          test "$(tr -d '\r\n ' < VERSION_CLIENT)" = "0.6.3"
          grep -Fq 'SERVER_TOOL_VERSION="0.6.9"' server/install_public_server.sh
          grep -Fq 'SCBL_SERVER_TOOL_VERSION", "0.6.9"' server/scbl_control_plane.py
          grep -Fq 'server_version = "SCBLControlPlane/0.6.9"' server/scbl_control_plane.py
          grep -Fq 'migrate_ddns_go_config_to_native_interface()' server/install_public_server.sh
          grep -Fq 'reset_ddns_go_password()' server/install_public_server.sh
          grep -Fq 'DEFAULT_DDNS_GO_LISTEN=""' server/install_public_server.sh
          ! grep -Fq 'DEFAULT_DDNS_GO_MODE' server/install_public_server.sh
          ! grep -Fq 'write_ddns_go_mode_enforcer()' server/install_public_server.sh
          ! grep -Fq 'prompt_ddns_go_mode()' server/install_public_server.sh
          ! grep -Fq '0.0.0.0:9876' server/install_public_server.sh
          ! grep -Fq '[::]:9876' server/install_public_server.sh
          test -f docs/releases/SERVER_TOOL_v0.6.9.md
          git diff --check

          if git diff --name-only | grep -Eq '^(client/|hooks/|EmbeddedFiles/)|(^|/)uplay_r1_loader(\.|/|$)'; then
            echo 'Windows client and Hooks must remain unchanged.' >&2
            exit 1
          fi

      - name: Commit non-workflow generated source to PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add VERSION_SERVER_TOOL COMPONENT_VERSIONS.json README.md CHANGELOG.md \
            server/install_public_server.sh server/scbl_control_plane.py \
            server/test_ddns_go_native.py docs/releases/SERVER_TOOL_v0.6.9.md
          if git diff --cached --quiet; then
            echo 'Generated non-workflow source is already committed.'
            exit 0
          fi
          git commit -m 'SCBL Server Tool v0.6.9: generate native DDNS-GO source'
          git push origin "HEAD:${HEAD_REF}"
