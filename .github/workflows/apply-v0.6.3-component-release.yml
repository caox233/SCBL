          $ErrorActionPreference = 'Stop'
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\client\build_all_windows.ps1
          .\client\create_client_full_package.ps1 -Version '${{ needs.metadata.outputs.version }}' -OutputDir "$env:GITHUB_WORKSPACE\dist"
          $zip = Get-ChildItem .\dist\SCBL-Client-v*-win-x86.zip | Select-Object -First 1
          if ($null -eq $zip) { throw 'Client ZIP was not generated.' }
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Set-Content -Encoding ascii "$($zip.FullName).sha256"
          $manifest = [ordered]@{
            schemaVersion = 2
            component = 'client'
            product = 'SCBL'
            channel = 'stable'
            version = '${{ needs.metadata.outputs.version }}'
            file = $zip.Name
            sha256 = $hash
            controlApiVersion = 1
            minimumServerToolVersion = '0.6.2'
            dedicatedServer = [ordered]@{
              repository = 'caox233/5th-echelon'
              releaseTag = 'scbl-public-stable-latest'
            }
          } | ConvertTo-Json -Depth 5
          [IO.File]::WriteAllText(
            (Join-Path $env:GITHUB_WORKSPACE 'dist\client-release-manifest.json'),
            $manifest,
            (New-Object Text.UTF8Encoding($false)))
      - uses: actions/upload-artifact@v4
        with:
          name: scbl-client-release
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: scbl-client-release
          path: dist
      - name: Publish immutable and rolling client releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.metadata.outputs.version }}'
          tag='${{ needs.metadata.outputs.tag }}'
          notes="docs/releases/CLIENT_v${version}.md"
          test -f "$notes"
          (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort) > SHA256SUMS.txt)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --title "SCBL Windows Client v${version}" --notes-file "$notes" --latest
          else
            gh release create "$tag" dist/* --title "SCBL Windows Client v${version}" --notes-file "$notes" --latest
          fi

          git tag -f client-stable-latest "$GITHUB_SHA"
          git push origin refs/tags/client-stable-latest --force
          if gh release view client-stable-latest >/dev/null 2>&1; then
            while read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset client-stable-latest "$asset" -y
            done < <(gh release view client-stable-latest --json assets --jq '.assets[].name')
            gh release edit client-stable-latest \
              --title "SCBL Windows Client Stable v${version}" \
              --notes-file "$notes" \
              --latest=false
            gh release upload client-stable-latest dist/*
          else
            gh release create client-stable-latest dist/* \
              --title "SCBL Windows Client Stable v${version}" \
              --notes-file "$notes" \
              --latest=false
          fi
''',
