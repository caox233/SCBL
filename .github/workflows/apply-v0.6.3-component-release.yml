          [[ "$requested" == "$source_version" ]]
          [[ "$requested" == "$props_version" ]]
          echo "version=$requested" >> "$GITHUB_OUTPUT"
          echo "tag=client-v$requested" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true
          cache-dependency-path: client/scbl-process-router/go.sum
      - name: Build and package client
        shell: powershell
