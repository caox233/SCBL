## Component releases

The Windows client, Linux server tool and 5th binary project are independently
versioned. This prevents client-only work from rebuilding the server package and
prevents server-script-only work from starting a Windows build.

- Client stable channel: `client-stable-latest`
- Server-tool stable channel: `server-tool-stable-latest`
