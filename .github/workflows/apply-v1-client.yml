name: Apply v1 client update flow

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/apply-v1-client.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Apply client changes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          write('client/SCBL.Version.props', '''<Project>
            <PropertyGroup>
              <!-- VERSION_CLIENT is the only Windows client version source. -->
              <ScblVersion>$([System.IO.File]::ReadAllText('$(MSBuildThisFileDirectory)..\\VERSION_CLIENT').Trim())</ScblVersion>
              <Version>$(ScblVersion)</Version>
              <AssemblyVersion>$(ScblVersion).0</AssemblyVersion>
              <FileVersion>$(ScblVersion).0</FileVersion>
              <InformationalVersion>$(ScblVersion)</InformationalVersion>
            </PropertyGroup>
          </Project>
          ''')

          write('client/ScblPublicLauncher/Services/RemoteClientUpdateService.cs', r'''using System;
          using System.IO;
          using System.Linq;
          using System.Net.Http;
          using System.Security.Cryptography;
          using System.Text.Json;
          using System.Threading;
          using System.Threading.Tasks;

          namespace SplinterCellCNLauncher.Services;

          public sealed class RemoteClientUpdateService
          {
              private const int CheckTimeoutSeconds = 8;
              private const int DownloadTimeoutSeconds = 900;

              public sealed class RemoteUpdateInfo
              {
                  public string Version { get; init; } = "";
                  public string BaseUrl { get; init; } = "";
                  public string FullPackage { get; init; } = "";
                  public string FullPackageSha256 { get; init; } = "";
                  public bool IsVersionUpgrade { get; init; } = true;
                  public string[] ReleaseNotes { get; init; } = Array.Empty<string>();
                  public string UpdateAnnouncementTitle { get; init; } = "";
                  public string UpdateAnnouncementBody { get; init; } = "";
                  public string UpdateAnnouncementTitleEn { get; init; } = "";
                  public string UpdateAnnouncementBodyEn { get; init; } = "";
                  public bool HasCustomUpdateAnnouncement =>
                      (!string.IsNullOrWhiteSpace(UpdateAnnouncementTitle) &&
                       !string.IsNullOrWhiteSpace(UpdateAnnouncementBody)) ||
                      (!string.IsNullOrWhiteSpace(UpdateAnnouncementTitleEn) &&
                       !string.IsNullOrWhiteSpace(UpdateAnnouncementBodyEn));
              }

              public sealed class RemoteUpdateCheckResult
              {
                  public bool Succeeded { get; init; }
                  public string BaseUrl { get; init; } = "";
                  public RemoteUpdateInfo? Update { get; init; }

                  public static RemoteUpdateCheckResult Unavailable(string baseUrl)
                      => new() { Succeeded = false, BaseUrl = baseUrl };

                  public static RemoteUpdateCheckResult Completed(string baseUrl, RemoteUpdateInfo? update)
                      => new() { Succeeded = true, BaseUrl = baseUrl, Update = update };
              }

              private sealed class RemoteManifest
              {
                  public string? version { get; set; }
                  public string? updateMode { get; set; }
                  public string? update_mode { get; set; }
                  public string? fullPackage { get; set; }
                  public string? full_package { get; set; }
                  public string? fullPackageSha256 { get; set; }
                  public string? full_package_sha256 { get; set; }
                  public string[]? release_notes { get; set; }
                  public string[]? releaseNotes { get; set; }
                  public RemoteUpdateAnnouncementDto? updateAnnouncement { get; set; }
                  public RemoteUpdateAnnouncementDto? update_announcement { get; set; }
              }

              private sealed class RemoteUpdateAnnouncementDto
              {
                  public bool? enabled { get; set; }
                  public string? title { get; set; }
                  public string? body { get; set; }
                  public string? title_zh { get; set; }
                  public string? body_zh { get; set; }
                  public string? title_en { get; set; }
                  public string? body_en { get; set; }
              }

              public async Task<RemoteUpdateCheckResult> CheckAsync(
                  string currentVersion,
                  string baseUrl,
                  CancellationToken cancellationToken = default)
              {
                  baseUrl = NormalizeBaseUrl(baseUrl);
                  string manifestUrl = baseUrl + "client_update_manifest.json";
                  try
                  {
                      using var timeout = CancellationTokenSource.CreateLinkedTokenSource(cancellationToken);
                      timeout.CancelAfter(TimeSpan.FromSeconds(CheckTimeoutSeconds));
                      using var http = CreateHttpClient();
                      using var response = await http.GetAsync(manifestUrl, timeout.Token).ConfigureAwait(false);
                      if (!response.IsSuccessStatusCode)
                      {
                          LogService.Info($"Client version information unavailable: url={manifestUrl}, status={(int)response.StatusCode}");
                          return RemoteUpdateCheckResult.Unavailable(baseUrl);
                      }

                      await using var stream = await response.Content.ReadAsStreamAsync(timeout.Token).ConfigureAwait(false);
                      var manifest = await JsonSerializer.DeserializeAsync<RemoteManifest>(stream, cancellationToken: timeout.Token).ConfigureAwait(false);
                      string targetVersion = NormalizeVersion(manifest?.version ?? "");
                      string current = NormalizeVersion(currentVersion);
                      string mode = (manifest?.updateMode ?? manifest?.update_mode ?? "").Trim();
                      string package = NormalizeRelativePath(manifest?.fullPackage ?? manifest?.full_package ?? "");
                      string expected = (manifest?.fullPackageSha256 ?? manifest?.full_package_sha256 ?? "").Trim().ToLowerInvariant();

                      if (!IsThreePartVersion(targetVersion) ||
                          !mode.Equals("full-package", StringComparison.OrdinalIgnoreCase) ||
                          !IsSafePackagePath(package) ||
                          !IsSha256(expected))
                      {
                          LogService.Error("Client version information is incomplete or invalid.");
                          return RemoteUpdateCheckResult.Unavailable(baseUrl);
                      }

                      if (current.Equals(targetVersion, StringComparison.OrdinalIgnoreCase))
                          return RemoteUpdateCheckResult.Completed(baseUrl, null);

                      var announcement = manifest?.updateAnnouncement ?? manifest?.update_announcement;
                      bool announcementEnabled = announcement?.enabled ?? true;
                      var update = new RemoteUpdateInfo
                      {
                          Version = targetVersion,
                          BaseUrl = baseUrl,
                          FullPackage = package,
                          FullPackageSha256 = expected,
                          IsVersionUpgrade = true,
                          ReleaseNotes = (manifest?.release_notes ?? manifest?.releaseNotes ?? Array.Empty<string>())
                              .Where(x => !string.IsNullOrWhiteSpace(x))
                              .Select(x => x.Trim())
                              .ToArray(),
                          UpdateAnnouncementTitle = announcementEnabled ? FirstNonEmpty(announcement?.title, announcement?.title_zh) : "",
                          UpdateAnnouncementBody = announcementEnabled ? FirstNonEmpty(announcement?.body, announcement?.body_zh) : "",
                          UpdateAnnouncementTitleEn = announcementEnabled ? (announcement?.title_en ?? "").Trim() : "",
                          UpdateAnnouncementBodyEn = announcementEnabled ? (announcement?.body_en ?? "").Trim() : ""
                      };
                      LogService.Info($"Client version mismatch: local={current}, required={targetVersion}");
                      return RemoteUpdateCheckResult.Completed(baseUrl, update);
                  }
                  catch (OperationCanceledException)
                  {
                      LogService.Info($"Client version check timed out: {manifestUrl}");
                      return RemoteUpdateCheckResult.Unavailable(baseUrl);
                  }
                  catch (Exception ex)
                  {
                      LogService.Info($"Client version check failed: endpoint={manifestUrl}, reason={ex.Message}");
                      return RemoteUpdateCheckResult.Unavailable(baseUrl);
                  }
              }

              public async Task<LocalClientUpdateService.UpdatePackageInfo> DownloadAsync(
                  RemoteUpdateInfo info,
                  CancellationToken cancellationToken = default)
              {
                  string tempRoot = Path.Combine(Path.GetTempPath(), "SCBL_Client_Update");
                  Directory.CreateDirectory(tempRoot);
                  string finalPath = Path.Combine(tempRoot, $"SCBL-Client-v{info.Version}-{Guid.NewGuid():N}.zip");
                  string partialPath = finalPath + ".download";
                  try
                  {
                      using var timeout = CancellationTokenSource.CreateLinkedTokenSource(cancellationToken);
                      timeout.CancelAfter(TimeSpan.FromSeconds(DownloadTimeoutSeconds));
                      using var http = CreateHttpClient();
                      string url = info.BaseUrl + info.FullPackage;
                      using var response = await http.GetAsync(url, HttpCompletionOption.ResponseHeadersRead, timeout.Token).ConfigureAwait(false);
                      response.EnsureSuccessStatusCode();
                      await using (var remote = await response.Content.ReadAsStreamAsync(timeout.Token).ConfigureAwait(false))
                      await using (var local = File.Create(partialPath))
                          await remote.CopyToAsync(local, timeout.Token).ConfigureAwait(false);

                      string actual = ComputeSha256(partialPath);
                      if (!actual.Equals(info.FullPackageSha256, StringComparison.OrdinalIgnoreCase))
                          throw new InvalidOperationException("客户端更新文件校验失败，请重新下载。");

                      File.Move(partialPath, finalPath, overwrite: true);
                      return new LocalClientUpdateService.UpdatePackageInfo
                      {
                          PackagePath = finalPath,
                          Version = info.Version,
                          PackageType = "client_update",
                          ReleaseNotes = info.ReleaseNotes,
                          LastWriteTimeUtc = File.GetLastWriteTimeUtc(finalPath)
                      };
                  }
                  catch
                  {
                      try { File.Delete(partialPath); } catch { }
                      try { File.Delete(finalPath); } catch { }
                      throw;
                  }
              }

              private static HttpClient CreateHttpClient()
              {
                  var handler = new SocketsHttpHandler
                  {
                      UseProxy = false,
                      Proxy = null,
                      ConnectTimeout = TimeSpan.FromSeconds(6),
                      PooledConnectionLifetime = TimeSpan.FromMinutes(2)
                  };
                  return new HttpClient(handler, disposeHandler: true) { Timeout = Timeout.InfiniteTimeSpan };
              }

              private static string NormalizeBaseUrl(string value)
                  => (value ?? "").Trim().TrimEnd('/') + "/";

              private static string NormalizeVersion(string value)
                  => (value ?? "").Trim().TrimStart('v', 'V');

              private static string NormalizeRelativePath(string value)
                  => (value ?? "").Replace('\\', '/').Trim().TrimStart('/');

              private static bool IsThreePartVersion(string value)
              {
                  string[] parts = value.Split('.');
                  return parts.Length == 3 && parts.All(x => int.TryParse(x, out int number) && number >= 0);
              }

              private static bool IsSafePackagePath(string value)
                  => !string.IsNullOrWhiteSpace(value)
                     && value.EndsWith(".zip", StringComparison.OrdinalIgnoreCase)
                     && !value.Contains(':')
                     && value.Split('/').All(part => !string.IsNullOrWhiteSpace(part) && part != "..");

              private static bool IsSha256(string value)
                  => value.Length == 64 && value.All(Uri.IsHexDigit);

              private static string ComputeSha256(string path)
              {
                  using var stream = File.OpenRead(path);
                  return Convert.ToHexString(SHA256.HashData(stream)).ToLowerInvariant();
              }

              private static string FirstNonEmpty(params string?[] values)
                  => values.FirstOrDefault(x => !string.IsNullOrWhiteSpace(x))?.Trim() ?? "";
          }
          ''')

          write('client/ScblPublicLauncher/Services/LocalClientUpdateService.cs', r'''using System;
          using System.Diagnostics;
          using System.IO;

          namespace SplinterCellCNLauncher.Services;

          public sealed class LocalClientUpdateService
          {
              public sealed class UpdatePackageInfo
              {
                  public string PackagePath { get; init; } = "";
                  public string Version { get; init; } = "";
                  public string PackageType { get; init; } = "client_update";
                  public string[] ReleaseNotes { get; init; } = Array.Empty<string>();
                  public DateTime LastWriteTimeUtc { get; init; }
              }

              public void StartUpdater(UpdatePackageInfo package, int launcherPid)
              {
                  string baseDir = AppContext.BaseDirectory.TrimEnd(Path.DirectorySeparatorChar, Path.AltDirectorySeparatorChar);
                  string updater = Path.Combine(baseDir, "SCBL.Updater.exe");
                  if (!File.Exists(updater))
                      updater = Path.Combine(baseDir, "tools", "SCBL.Updater.exe");
                  if (!File.Exists(updater))
                      throw new FileNotFoundException("没有找到客户端更新程序。", updater);

                  string launcherExe = Process.GetCurrentProcess().MainModule?.FileName ?? Path.Combine(baseDir, "SplinterCellCNLauncher.exe");
                  var psi = new ProcessStartInfo
                  {
                      FileName = updater,
                      UseShellExecute = true,
                      WorkingDirectory = baseDir,
                      Arguments = $"--package {Quote(package.PackagePath)} --version {Quote(package.Version)} --target {Quote(baseDir)} --pid {launcherPid} --restart {Quote(launcherExe)}"
                  };
                  Process.Start(psi);
              }

              private static string Quote(string value) => "\"" + value.Replace("\"", "\\\"") + "\"";
          }
          ''')

          settings = read('client/ScblPublicLauncher/Models/LauncherSettings.cs')
          settings = settings.replace('''    // 服务端远程更新：启动时先通过公网主机:PublicUpdatePort 检查；公网失败后，
              // 接入 EasyTier 私网并继续使用 10.66.0.1:18080 作为兼容兜底。
              public bool AutoCheckRemoteUpdate { get; set; } = true;
              public int PublicUpdatePort { get; set; } = 18080;
              public string LastSkippedRemoteUpdateVersion { get; set; } = "";
              public string LastConfirmedRemoteUpdateVersion { get; set; } = "";
          ''', '''    // 启动器首先通过公网更新端口确认正式版本，版本不一致时必须更新。
              public int PublicUpdatePort { get; set; } = 18080;
          ''')
          write('client/ScblPublicLauncher/Models/LauncherSettings.cs', settings)

          settings_service = read('client/ScblPublicLauncher/Services/LauncherSettingsService.cs')
          for line in [
              '            AutoCheckRemoteUpdate = settings.AutoCheckRemoteUpdate,\n',
              '            LastSkippedRemoteUpdateVersion = settings.LastSkippedRemoteUpdateVersion,\n',
              '            LastConfirmedRemoteUpdateVersion = settings.LastConfirmedRemoteUpdateVersion,\n',
          ]:
              settings_service = settings_service.replace(line, '')
          write('client/ScblPublicLauncher/Services/LauncherSettingsService.cs', settings_service)

          models = read('client/ScblPublicLauncher/Models/ControlPlaneModels.cs')
          models = replace_once(models, '''    public string MinimumClientVersion { get; init; } = "";
              public bool ClientVersionAccepted { get; init; } = true;
          ''', '''    public string RequiredClientVersion { get; init; } = "";
              public bool ClientVersionAccepted { get; init; }
              public bool UpdateRequired { get; init; }
          ''', 'control plane model')
          write('client/ScblPublicLauncher/Models/ControlPlaneModels.cs', models)

          control = read('client/ScblPublicLauncher/Services/ControlPlaneService.cs')
          control = re.sub(r'''\n    public static bool IsVersionOlderThan\(string current, string minimum\)\n    \{.*?\n    \}\n\n    private static Version ParseThreePartVersion\(string value\)\n    \{.*?\n    \}\n''', '\n', control, flags=re.S)
          write('client/ScblPublicLauncher/Services/ControlPlaneService.cs', control)

          updater = read('client/SCBL.Updater/Program.cs')
          updater = replace_once(updater,
              '            string? restart = GetArg(args, "--restart");\n',
              '            string? restart = GetArg(args, "--restart");\n            string? requestedVersion = GetArg(args, "--version");\n',
              'updater version argument')
          updater = replace_once(updater,
              '''                ApplyFullPackage(package, target);
                      }
          ''',
              '''                ApplyFullPackage(package, target);
                          appliedVersion = NormalizeVersion(requestedVersion);
                          if (string.IsNullOrWhiteSpace(appliedVersion))
                              throw new InvalidOperationException("Missing or invalid --version for full client update.");
                      }
          ''',
              'updater full package version')
          insert_at = updater.index('    private static string? GetArg(')
          updater = updater[:insert_at] + '''    private static string NormalizeVersion(string? value)
              {
                  string normalized = (value ?? string.Empty).Trim().TrimStart('v', 'V');
                  string[] parts = normalized.Split('.');
                  return parts.Length == 3 && parts.All(x => int.TryParse(x, out int number) && number >= 0)
                      ? normalized
                      : string.Empty;
              }

          ''' + updater[insert_at:]
          write('client/SCBL.Updater/Program.cs', updater)

          main = read('client/ScblPublicLauncher/MainWindow.xaml.cs')
          main = main.replace('    private bool _remoteUpdateDeferredForGame;\n', '')
          main = main.replace('    private bool _remoteUpdateCheckedThisSession;\n', '')
          main = re.sub(r'''\n        if \(NormalizeVersionForComparison\(_settings\.LastConfirmedRemoteUpdateVersion\).*?\n        \}\n''', '\n', main, count=1, flags=re.S)
          main = main.replace('        SetGameRunningState(false);\n        PlayStartupMusicIfEnabled();\n', '')

          old_load = '''    private void LoadSettingsToUi()
              {
                  _settings = _settingsService.Load();
                  txtUsername.Text = _settings.Username;
                  txtPassword.Password = _settings.Password;
                  cmbGameExecutable.SelectedIndex = _settings.GameExecutable.Equals("Blacklist_DX11_game.exe", StringComparison.OrdinalIgnoreCase) ? 1 : 0;
                  _assignedIp = !string.IsNullOrWhiteSpace(_settings.LastAssignedVirtualIp) ? _settings.LastAssignedVirtualIp : _settings.LastBindIp;

                  if (_gameLocatorService.IsValidGameDirectory(_settings.GameDirectory))
                  {
                      _gameDir = _settings.GameDirectory;
                      LogService.Info($"Loaded saved game directory: {_gameDir}");
                  }
                  else
                  {
                      string? detectedDir = _gameLocatorService.TryAutoFindGameDirectory();
                      if (!string.IsNullOrWhiteSpace(detectedDir))
                      {
                          _gameDir = detectedDir;
                          _settings.GameDirectory = detectedDir;
                          _settingsService.Save(_settings);
                          LogService.Info($"Auto detected game directory: {detectedDir}");
                      }
                      else
                      {
                          _gameDir = "";
                          LogService.Info("Game directory was not auto detected.");
                      }
                  }

                  Directory.CreateDirectory(LogService.LogDirectory);
                  _settingsService.Save(_settings); // 写入公网入口/隧道密钥默认项，方便维护者后续修改。
                  LogService.Info("Public launcher ready.");
                  LogService.Info($"Settings path: {_settingsService.SettingsPath}");
                  LogService.Info($"Public endpoint loaded: {GetConfiguredPublicEndpoint()}");
              }
          '''
          new_load = '''    private void LoadSettingsToUi()
              {
                  _settings = _settingsService.Load();
                  txtUsername.Text = _settings.Username;
                  txtPassword.Password = _settings.Password;
                  cmbGameExecutable.SelectedIndex = _settings.GameExecutable.Equals("Blacklist_DX11_game.exe", StringComparison.OrdinalIgnoreCase) ? 1 : 0;
                  _assignedIp = !string.IsNullOrWhiteSpace(_settings.LastAssignedVirtualIp) ? _settings.LastAssignedVirtualIp : _settings.LastBindIp;
                  Directory.CreateDirectory(LogService.LogDirectory);
              }

              private void InitializeLocalStateAfterVersionCheck()
              {
                  if (_gameLocatorService.IsValidGameDirectory(_settings.GameDirectory))
                  {
                      _gameDir = _settings.GameDirectory;
                      LogService.Info($"Loaded saved game directory: {_gameDir}");
                  }
                  else
                  {
                      string? detectedDir = _gameLocatorService.TryAutoFindGameDirectory();
                      if (!string.IsNullOrWhiteSpace(detectedDir))
                      {
                          _gameDir = detectedDir;
                          _settings.GameDirectory = detectedDir;
                          LogService.Info($"Auto detected game directory: {detectedDir}");
                      }
                      else
                      {
                          _gameDir = "";
                          LogService.Info("Game directory was not auto detected.");
                      }
                  }

                  _settingsService.Save(_settings);
                  LogService.Info("Public launcher ready.");
                  LogService.Info($"Settings path: {_settingsService.SettingsPath}");
                  LogService.Info($"Public endpoint loaded: {GetConfiguredPublicEndpoint()}");
              }
          '''
          main = replace_once(main, old_load, new_load, 'split startup initialization')

          old_loaded = '''        // v0.6.0: keep the existing update protocol, but check it before EasyTier starts.
                  // The public update endpoint uses the configured public host with TCP/18080.
                  // If it is unavailable, startup continues and the original private endpoint is retried
                  // after the EasyTier overlay becomes ready.
                  await CheckRemoteClientUpdateBeforeNetworkAsync();
                  if (_allowClose)
                      return;

                  await HandleFirstRunSaveOverwritePromptAsync();
          '''
          new_loaded = '''        // Version confirmation is the first functional startup step. Nothing else is
                  // initialized until the server confirms that this is the current formal client.
                  if (!await EnsureRequiredClientVersionAsync() || _allowClose)
                      return;

                  InitializeLocalStateAfterVersionCheck();
                  SetGameRunningState(false);
                  PlayStartupMusicIfEnabled();

                  await HandleFirstRunSaveOverwritePromptAsync();
          '''
          main = replace_once(main, old_loaded, new_loaded, 'startup version priority')

          block_start = main.index('    private async Task CheckRemoteClientServicesAfterNetworkAsync()')
          block_end = main.index('    private async Task CheckRemoteAnnouncementsAfterNetworkAsync()', block_start)
          new_block = r'''    private async Task CheckRemoteClientServicesAfterNetworkAsync()
              {
                  if (_networkReady && !_allowClose)
                      await CheckRemoteAnnouncementsAfterNetworkAsync();
              }

              private async Task<bool> EnsureRequiredClientVersionAsync()
              {
                  string baseUrl = PublicTunnelConfig.BuildPublicUpdateBaseUrl(
                      GetConfiguredPublicEndpoint(),
                      _settings.PublicUpdatePort);
                  SetUpdatingState(true);
                  SetBusy(true, L("正在检查客户端版本...", "Checking client version..."));

                  while (!_allowClose)
                  {
                      var check = await _remoteUpdateService.CheckAsync(LauncherVersion, baseUrl);
                      if (!check.Succeeded)
                      {
                          MessageBoxResult retry = await ShowConfirmDialogAsync(
                              L("无法检查客户端版本", "Unable to Check Client Version"),
                              L("暂时无法连接客户端更新服务。需要确认版本后才能继续使用。\n\n请检查网络连接后重新检查。",
                                "The client update service is currently unavailable. The launcher must confirm the current version before continuing.\n\nCheck your network connection and try again."),
                              L("重新检查", "Try Again"),
                              L("退出", "Exit"));
                          if (retry == MessageBoxResult.Yes)
                              continue;
                          ExitForRequiredUpdate();
                          return false;
                      }

                      RemoteClientUpdateService.RemoteUpdateInfo? info = check.Update;
                      if (info == null)
                      {
                          LogService.Info($"Client version confirmed: {LauncherVersion}");
                          SetBusy(false);
                          SetUpdatingState(false);
                          return true;
                      }

                      string notes = info.ReleaseNotes.Length > 0
                          ? string.Join("\n", info.ReleaseNotes.Select(x => "- " + x))
                          : L("- 正式版本更新", "- Formal release update");
                      string title = info.HasCustomUpdateAnnouncement
                          ? (IsEnglish && !string.IsNullOrWhiteSpace(info.UpdateAnnouncementTitleEn)
                              ? info.UpdateAnnouncementTitleEn
                              : FirstNonEmptyText(info.UpdateAnnouncementTitle, info.UpdateAnnouncementTitleEn,
                                  L($"发现新版本 v{info.Version}", $"New Version v{info.Version}")))
                          : L($"发现新版本 v{info.Version}", $"New Version v{info.Version}");
                      string body = info.HasCustomUpdateAnnouncement
                          ? (IsEnglish && !string.IsNullOrWhiteSpace(info.UpdateAnnouncementBodyEn)
                              ? info.UpdateAnnouncementBodyEn
                              : FirstNonEmptyText(info.UpdateAnnouncementBody, info.UpdateAnnouncementBodyEn,
                                  L($"需要更新到 v{info.Version} 后才能继续使用。", $"Update to v{info.Version} is required before continuing.")))
                          : L($"当前版本：v{LauncherVersion}\n正式版本：v{info.Version}\n\n需要完成更新后才能继续使用。\n\n更新内容：\n{notes}",
                              $"Current version: v{LauncherVersion}\nRequired version: v{info.Version}\n\nThe update must be completed before continuing.\n\nChanges:\n{notes}");

                      MessageBoxResult choice = await ShowConfirmDialogAsync(
                          title,
                          body,
                          L("立即更新", "Update Now"),
                          L("退出", "Exit"));
                      if (choice != MessageBoxResult.Yes)
                      {
                          ExitForRequiredUpdate();
                          return false;
                      }

                      try
                      {
                          SetBusy(true, L("正在下载客户端更新...", "Downloading client update..."));
                          var package = await _remoteUpdateService.DownloadAsync(info);
                          _localUpdateService.StartUpdater(package, Environment.ProcessId);
                          _allowClose = true;
                          Application.Current.Shutdown();
                          return false;
                      }
                      catch (Exception ex)
                      {
                          LogService.Error($"Client update failed: {ex}");
                          MessageBoxResult retry = await ShowConfirmDialogAsync(
                              L("客户端更新失败", "Client Update Failed"),
                              L("客户端更新没有完成，请检查网络连接后重试。\n\n详细信息已写入日志。",
                                "The client update did not complete. Check your network connection and try again.\n\nDetails were written to the log."),
                              L("重新尝试", "Try Again"),
                              L("退出", "Exit"));
                          if (retry == MessageBoxResult.Yes)
                              continue;
                          ExitForRequiredUpdate();
                          return false;
                      }
                  }

                  return false;
              }

              private static string FirstNonEmptyText(params string[] values)
                  => values.FirstOrDefault(x => !string.IsNullOrWhiteSpace(x))?.Trim() ?? "";

              private void ExitForRequiredUpdate()
              {
                  _allowClose = true;
                  Application.Current.Shutdown();
              }

          '''
          main = main[:block_start] + new_block + main[block_end:]

          main = re.sub(r'''\n        if \(!running && _remoteUpdateDeferredForGame.*?\n        \}\n''', '\n', main, count=1, flags=re.S)
          old_bootstrap = '''        if (!bootstrap.ClientVersionAccepted
                      || ControlPlaneService.IsVersionOlderThan(LauncherVersion, bootstrap.MinimumClientVersion))
                  {
                      throw new InvalidOperationException(L(
                          $"当前客户端版本过低。服务器要求至少 v{bootstrap.MinimumClientVersion}，请先更新客户端。",
                          $"This client is too old. Server minimum is v{bootstrap.MinimumClientVersion}; update the client first."));
                  }
          '''
          new_bootstrap = '''        if (!bootstrap.ClientVersionAccepted || bootstrap.UpdateRequired)
                  {
                      throw new InvalidOperationException(L(
                          $"客户端版本与服务器当前版本不一致。请重新打开启动器并完成 v{bootstrap.RequiredClientVersion} 更新。",
                          $"The client version does not match the server. Reopen the launcher and complete the v{bootstrap.RequiredClientVersion} update."));
                  }
          '''
          main = replace_once(main, old_bootstrap, new_bootstrap, 'control plane exact version')
          main = main.replace(
              'LogService.Info($"Control plane bootstrap: serverTool={bootstrap.ServerToolVersion}, minClient={bootstrap.MinimumClientVersion}, online={bootstrap.OnlineCount}, accountExists={bootstrap.AccountExists?.ToString() ?? "unknown"}, health={bootstrap.Health.Overall}.");',
              'LogService.Info($"Control plane bootstrap: serverTool={bootstrap.ServerToolVersion}, requiredClient={bootstrap.RequiredClientVersion}, online={bootstrap.OnlineCount}, accountExists={bootstrap.AccountExists?.ToString() ?? "unknown"}, health={bootstrap.Health.Overall}.");')
          write('client/ScblPublicLauncher/MainWindow.xaml.cs', main)

          # Static checks before invoking the compiler.
          required = [
              'EnsureRequiredClientVersionAsync()',
              'if (!await EnsureRequiredClientVersionAsync() || _allowClose)',
              'L("立即更新", "Update Now")',
              'L("退出", "Exit")',
              'updateMode',
              'fullPackageSha256',
              '--version {Quote(package.Version)}',
          ]
          combined = '\n'.join(read(p) for p in [
              'client/ScblPublicLauncher/MainWindow.xaml.cs',
              'client/ScblPublicLauncher/Services/RemoteClientUpdateService.cs',
              'client/ScblPublicLauncher/Services/LocalClientUpdateService.cs',
          ])
          for marker in required:
              if marker not in combined:
                  raise SystemExit(f'missing client marker: {marker}')
          forbidden = [
              'CheckRemoteClientUpdateAfterNetworkAsync',
              'LastSkippedRemoteUpdateVersion',
              'LastConfirmedRemoteUpdateVersion',
              'AutoCheckRemoteUpdate',
              'MinimumClientVersion',
              'IsVersionOlderThan',
          ]
          for marker in forbidden:
              if marker in combined or marker in read('client/ScblPublicLauncher/Models/LauncherSettings.cs') or marker in read('client/ScblPublicLauncher/Services/LauncherSettingsService.cs') or marker in read('client/ScblPublicLauncher/Models/ControlPlaneModels.cs') or marker in read('client/ScblPublicLauncher/Services/ControlPlaneService.cs'):
                  raise SystemExit(f'old client marker remains: {marker}')
          PY

          dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj --runtime win-x86
          dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -r win-x86 --no-restore --nologo
          dotnet restore client/SCBL.Updater/SCBL.Updater.csproj --runtime win-x86
          dotnet build client/SCBL.Updater/SCBL.Updater.csproj -c Release -r win-x86 --no-restore --nologo

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add client
          git commit -m 'make client version check mandatory and first'
          git push
