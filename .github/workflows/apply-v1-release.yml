name: Apply v1 formal release metadata

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/apply-v1-release.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Apply formal v1 release changes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json, re
          from textwrap import dedent

          def write(path, text):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(dedent(text).lstrip(), encoding='utf-8')

          for name in ['VERSION', 'VERSION_CLIENT', 'VERSION_SERVER_TOOL']:
              Path(name).write_text('1.0.0\n', encoding='utf-8')

          data = json.loads(Path('COMPONENT_VERSIONS.json').read_text(encoding='utf-8'))
          data['clientVersion'] = '1.0.0'
          data['serverToolVersion'] = '1.0.0'
          Path('COMPONENT_VERSIONS.json').write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          router = Path('client/scbl-process-router/main.go')
          text = router.read_text(encoding='utf-8')
          if text.count('routerVersion         = "0.6.3"') != 1:
              raise SystemExit('Route Guard version marker mismatch')
          router.write_text(text.replace('routerVersion         = "0.6.3"', 'routerVersion         = "1.0.0"', 1), encoding='utf-8')

          control = Path('server/scbl_control_plane.py')
          text = control.read_text(encoding='utf-8')
          text = re.sub(r'server_version = "SCBLControlPlane/[^"]+"', 'server_version = f"SCBLControlPlane/{SERVER_TOOL_VERSION}"', text, count=1)
          control.write_text(text, encoding='utf-8')

          write('docs/releases/CLIENT_v1.0.0.md', '''
          # [CLIENT] Windows Client v1.0.0

          SCBL Windows 客户端首个正式版本。

          ## 主要内容

          - 客户端版本检查调整为启动后的首要流程。
          - 未确认正式版本前，不扫描游戏目录、不启动 EasyTier、不播放启动音乐，也不能启动游戏。
          - 发现版本不一致时，用户只能立即更新或退出。
          - 无法连接更新服务时，用户只能重新检查或退出。
          - 客户端使用服务器发布的完整 ZIP 更新，并在安装前校验文件。
          - Launcher、Updater 和发布包版本统一从 `VERSION_CLIENT` 读取。

          ## 安全边界

          - Hooks 源码及 `uplay_r1_loader.dll` 未修改。
          - WinDivert、EasyTier 和 Route Guard 的既有安全边界保持不变。
          ''')

          write('docs/releases/SERVER_TOOL_v1.0.0.md', '''
          # [SERVER] Server Tool v1.0.0

          SCBL Linux 服务端管理工具首个正式版本。

          ## 主要内容

          - 删除安装时手工填写的最低客户端版本。
          - 控制平面自动读取服务器当前发布的客户端版本，并要求客户端精确匹配。
          - 首次部署没有客户端包时，自动下载 GitHub 正式客户端完整包。
          - 重新部署或升级时自动比较版本和 SHA256；相同版本不重复下载，现有高版本不自动降级。
          - Server Tool 在线升级直接下载对应版本完整包，不再经过 Stable Release。
          - Server Tool 版本从随包携带的 `VERSION_SERVER_TOOL` 自动读取。
          - 用户提示改为正常操作语言，不再显示不必要的实现术语。

          ## 数据保护

          - 不修改、不覆盖 `server/5th-echelon.db`。
          - 保留 `scbl.env`、客户端更新数据、备份目录和 DDNS-GO 配置。
          - Hooks 源码及 DLL 未修改。
          ''')

          changelog = Path('CHANGELOG.md').read_text(encoding='utf-8')
          v1 = '''# 更新记录

          ## v1.0.0 正式版

          - 客户端版本确认成为启动器首要流程，版本不一致时必须更新或退出。
          - 客户端和服务端统一使用完整包更新，版本由发布文件自动识别。
          - 删除客户端和服务端的 Stable Release，正式版本使用清晰的 `[CLIENT]`、`[SERVER]` 标题。
          - 删除人工最低客户端版本配置，控制平面自动要求服务器当前发布的客户端版本。
          - 首次部署和 Server Tool 升级后自动检查并同步正式客户端。

          '''
          changelog = re.sub(r'^# 更新记录\n+', '', changelog)
          Path('CHANGELOG.md').write_text(dedent(v1).lstrip() + changelog, encoding='utf-8')

          write('README.md', '''
          # SCBL

          SCBL 是面向《细胞分裂：黑名单》社区联机环境的自建客户端、Linux 服务端部署和客户端更新管理项目。

          > 当前 Windows 客户端：**v1.0.0**  
          > 当前 Linux 服务端工具：**v1.0.0**

          ## 快速开始

          ### Windows 客户端

          前往仓库的 Releases 页面，下载标题为 **[CLIENT] Windows Client v1.0.0** 的版本：

          ```text
          SCBL-Client-v1.0.0-win-x86.zip
          ```

          解压后运行 `SplinterCellCNLauncher.exe`。启动器会先确认服务器当前正式版本；版本不一致时必须更新或退出。

          ### Linux 服务端

          ```bash
          curl -fsSL https://raw.githubusercontent.com/caox233/SCBL/main/scripts/install-server.sh | sudo bash
          ```

          安装脚本读取 `VERSION_SERVER_TOOL`，下载对应的 **[SERVER] Server Tool vX.Y.Z** 完整包并校验文件。

          ## 版本和更新

          - `VERSION_CLIENT` 是 Windows 客户端版本来源。
          - `VERSION_SERVER_TOOL` 是 Linux 服务端工具版本来源。
          - Release 标签分别为 `client-vX.Y.Z` 和 `server-tool-vX.Y.Z`。
          - Release 标题分别以 `[CLIENT]` 和 `[SERVER]` 开头，便于在同一列表中区分。
          - 每个组件仅保留当前版本和上一版本，不再创建 Stable Release。

          服务端首次部署或升级后会自动检查正式客户端：

          ```text
          没有客户端包        → 下载最新版完整包
          本地版本较旧        → 下载最新版完整包
          版本和 SHA256 一致  → 不重复下载
          本地版本较高        → 保留现有版本
          检查失败且已有包    → 继续使用现有版本
          检查失败且没有包    → 提示部署未完成
          ```

          服务器把当前正式客户端版本写入更新信息。Launcher 启动时先读取该信息：版本一致才继续初始化游戏目录、网络和其他功能；版本不一致只能更新或退出。

          ## 本地编译

          ```powershell
          git clone https://github.com/caox233/SCBL.git
          cd SCBL\client
          powershell -ExecutionPolicy Bypass -File .\build_all_windows.ps1 -Fast -Package
          ```

          客户端构建从 `caox233/5th-echelon` 的已验证 Release 获取 Hooks DLL；SCBL 仓库不保存 Hooks 源码或预编译 Hooks 文件。

          ## 目录

          ```text
          client/      Windows Launcher、Updater、EasyTier 准备脚本和 Route Guard
          server/      Linux 服务端管理器和控制平面
          scripts/     服务端安装入口和维护脚本
          docs/        发布说明和技术文档
          .github/     验证、构建和发布工作流
          ```

          ## 安全说明

          客户端的严格路由和局域网广播转换使用 WinDivert 2.2.2。少数安全软件可能基于驱动的数据包处理能力显示风险提示。请只从本仓库正式 Release 下载，并核对 SHA256。

          SCBL 不会自动关闭安全软件、添加排除项或绕过安全检测。`dedicated_server`、Hooks 源码和 Hooks DLL 由 5th 项目独立构建和发布，SCBL 只下载经校验的正式资产。

          SCBL 是非官方社区项目，与 Ubisoft 无隶属或授权关系。本仓库不包含游戏本体文件。
          ''')

          write('docs/RELEASE_ARCHITECTURE.md', '''
          # SCBL 发布结构

          ## 版本来源

          | 组件 | 唯一版本文件 | Release 标签 | Release 标题 |
          |---|---|---|---|
          | Windows 客户端 | `VERSION_CLIENT` | `client-vX.Y.Z` | `[CLIENT] Windows Client vX.Y.Z` |
          | Linux 服务端工具 | `VERSION_SERVER_TOOL` | `server-tool-vX.Y.Z` | `[SERVER] Server Tool vX.Y.Z` |
          | 5th dedicated server 与 Hooks | 5th 项目维护 | 5th 项目标签 | 5th 项目维护 |

          客户端和服务端不再创建 `stable-latest` Release。安装器和管理工具读取主分支版本文件，再下载对应的正式完整包和 SHA256。

          ## 客户端启动顺序

          1. 启动 Updater 自检。
          2. 通过公网更新端口读取服务器客户端更新信息。
          3. 版本一致：继续启动。
          4. 版本不一致：立即更新或退出。
          5. 无法检查：重新检查或退出。
          6. 版本确认完成后，才扫描游戏目录、播放音乐、清理旧进程和启动 EasyTier。

          ## 服务端客户端包同步

          首次部署和 Server Tool 升级完成后，服务端读取 `VERSION_CLIENT`，下载 `client-vX.Y.Z` 的完整 ZIP 和 SHA256。服务器更新信息只包含当前版本、完整包路径、完整包 SHA256、更新摘要和公告。

          ## 保留策略

          每个组件保留最新两个正式 Release。版本包不会被同名覆盖；同版本重新运行发布流程只在发布工作流本身发生变化或手动执行时更新资产。

          ## 数据边界

          Server Tool 更新不得覆盖 `scbl.env`、`server/5th-echelon.db`、客户端更新目录、备份目录或 DDNS-GO 配置。Hooks 源码和 DLL 不在 SCBL 仓库内修改或重新构建。
          ''')

          write('server/test_release_manifest_routing.py', '''
          #!/usr/bin/env python3
          from pathlib import Path

          manager = Path("server/install_public_server.sh").read_text(encoding="utf-8")
          bootstrap = Path("scripts/install-server.sh").read_text(encoding="utf-8")
          client_release = Path(".github/workflows/client-release.yml").read_text(encoding="utf-8")
          server_release = Path(".github/workflows/server-tool-release.yml").read_text(encoding="utf-8")

          for text in (manager, bootstrap, client_release, server_release):
              assert "client-stable-latest" not in text
              assert "server-tool-stable-latest" not in text
          assert "VERSION_CLIENT" in manager
          assert "client-v${version}" in manager
          assert "VERSION_SERVER_TOOL" in manager
          assert "server-tool-v${version}" in manager
          assert "VERSION_SERVER_TOOL" in bootstrap
          assert "server-tool-v${version}" in bootstrap
          assert "client-release-manifest.json" not in client_release
          assert "server-tool-release-manifest.json" not in server_release
          assert "[CLIENT] Windows Client v${version}" in client_release
          assert "[SERVER] Server Tool v${version}" in server_release
          print("direct formal release routing checks passed")
          ''')

          write('server/test_ddns_go_native.py', '''
          #!/usr/bin/env python3
          from pathlib import Path

          manager = Path("server/install_public_server.sh").read_text(encoding="utf-8")
          assert "read_server_tool_version" in manager
          assert "DEFAULT_DDNS_GO_MODE" not in manager
          assert "DDNS_GO_MODE" not in manager
          assert "write_ddns_go_mode_enforcer" not in manager
          assert "prompt_ddns_go_mode" not in manager
          assert "migrate_ddns_go_config_to_native_interface" in manager
          assert "cleanup_legacy_ddns_go_management" in manager
          assert "reset_ddns_go_password" in manager
          assert 'set_value(section, "gettype", "netInterface")' in manager
          assert 'set_value(section, "netinterface", iface)' in manager
          assert 'DEFAULT_DDNS_GO_LISTEN=""' in manager
          assert 'DDNS_GO_LISTEN="$(normalize_ddns_go_listen' in manager
          assert "0.0.0.0:9876" not in manager
          assert "[::]:9876" not in manager
          assert 'ExecStart=/opt/ddns-go/ddns-go -l ${DDNS_GO_LISTEN}' in manager
          start = manager.index("write_ddns_go_service() {")
          end = manager.index("\n}\n\nrun_server_tool_migrations()", start) + 2
          service_function = manager[start:end]
          assert service_function.count("write_ddns_go_service") == 1
          assert "cat > /etc/systemd/system/ddns-go.service <<UNITEOF" in service_function
          assert "[SERVER] Server Tool v1.0.0" in Path("docs/releases/SERVER_TOOL_v1.0.0.md").read_text(encoding="utf-8")
          print("DDNS-GO native management source checks passed")
          ''')

          # Add a focused required-client-version check to the control-plane test.
          test_path = Path('server/test_control_plane.py')
          test = test_path.read_text(encoding='utf-8')
          test = test.replace('"""Focused v0.6.2 tests for authoritative SCBL game-session snapshots."""', '"""Focused tests for SCBL control-plane snapshots and automatic client versions."""')
          marker = '        control_plane.DB_PATH = db_path\n'
          addition = '''        control_plane.SCBL_ROOT = Path(tmp)
                  updates = control_plane.SCBL_ROOT / "client-updates"
                  updates.mkdir(parents=True)
                  (updates / "client_update_manifest.json").write_text('{"version":"1.0.0"}', encoding="utf-8")
                  assert control_plane.required_client_version() == "1.0.0"

          '''
          if test.count(marker) != 1:
              raise SystemExit('control plane test anchor mismatch')
          test = test.replace(marker, addition + marker, 1)
          test_path.write_text(test, encoding='utf-8')

          write('.github/workflows/client-release.yml', r'''
          name: Publish SCBL Windows client

          on:
            push:
              branches: [main]
              paths:
                - VERSION_CLIENT
                - client/**
                - docs/releases/CLIENT_v*.md
                - .github/workflows/client-release.yml
            workflow_dispatch:
              inputs:
                version:
                  description: Client version; leave empty to use VERSION_CLIENT
                  required: false
                  type: string

          permissions:
            contents: write

          concurrency:
            group: scbl-client-release
            cancel-in-progress: false

          jobs:
            metadata:
              runs-on: ubuntu-24.04
              outputs:
                version: ${{ steps.version.outputs.version }}
                tag: ${{ steps.version.outputs.tag }}
                skip: ${{ steps.version.outputs.skip }}
              steps:
                - uses: actions/checkout@v4
                  with: { fetch-depth: 2 }
                - id: version
                  env: { GH_TOKEN: '${{ github.token }}' }
                  shell: bash
                  run: |
                    set -euo pipefail
                    source_version="$(tr -d '\r\n ' < VERSION_CLIENT)"
                    requested='${{ inputs.version }}'; requested="${requested#v}"
                    [[ -n "$requested" ]] || requested="$source_version"
                    [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ && "$requested" == "$source_version" ]]
                    grep -Fq 'ReadAllText' client/SCBL.Version.props
                    grep -Fq 'VERSION_CLIENT' client/SCBL.Version.props
                    tag="client-v$requested"; skip=false
                    if [[ "${GITHUB_EVENT_NAME}" == push ]] && gh release view "$tag" >/dev/null 2>&1; then
                      before='${{ github.event.before }}'; previous=""; pipeline_changed=false
                      if [[ -n "$before" && ! "$before" =~ ^0+$ ]] && git cat-file -e "$before^{commit}" 2>/dev/null; then
                        previous="$(git show "$before:VERSION_CLIENT" 2>/dev/null | tr -d '\r\n ' || true)"
                        git diff --name-only "$before" "$GITHUB_SHA" | grep -Fxq '.github/workflows/client-release.yml' && pipeline_changed=true || true
                      fi
                      [[ "$previous" != "$requested" || "$pipeline_changed" == true ]] || skip=true
                    fi
                    echo "version=$requested" >> "$GITHUB_OUTPUT"
                    echo "tag=$tag" >> "$GITHUB_OUTPUT"
                    echo "skip=$skip" >> "$GITHUB_OUTPUT"

            build:
              needs: metadata
              if: needs.metadata.outputs.skip != 'true'
              runs-on: windows-2022
              timeout-minutes: 35
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-dotnet@v4
                  with: { dotnet-version: 8.0.x }
                - uses: actions/setup-go@v5
                  with:
                    go-version: 1.23.2
                    cache: true
                    cache-dependency-path: client/scbl-process-router/go.sum
                - uses: actions/cache@v4
                  with:
                    path: ~/.nuget/packages
                    key: nuget-${{ runner.os }}-${{ hashFiles('client/**/*.csproj', 'client/**/*.props', 'client/**/*.targets') }}
                    restore-keys: nuget-${{ runner.os }}-
                - uses: actions/cache@v4
                  with:
                    path: |
                      client/easytier/bin
                      client/easytier/cache
                      client/scbl-process-router/WinDivert.dll
                      client/scbl-process-router/WinDivert64.sys
                    key: client-runtime-${{ runner.os }}-${{ hashFiles('client/easytier/download_easytier_windows.ps1', 'client/scbl-process-router/download_windivert.ps1') }}
                - uses: actions/cache@v4
                  with:
                    path: client/ScblPublicLauncher/EmbeddedFiles/uplay_r1_loader.dll
                    key: hooks-win-x86-${{ hashFiles('client/ScblPublicLauncher/EmbeddedFiles/SCBL_EMBEDDED_SHA256.txt') }}
                - name: Build client v${{ needs.metadata.outputs.version }}
                  shell: powershell
                  run: |
                    $ErrorActionPreference = 'Stop'
                    .\client\build_all_windows.ps1 -Fast -Package -OutputDir "$env:GITHUB_WORKSPACE\dist"
                    $version = '${{ needs.metadata.outputs.version }}'
                    $zip = Get-Item ".\dist\SCBL-Client-v$version-win-x86.zip"
                    $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                    "$hash  $($zip.Name)" | Set-Content -Encoding ascii "$($zip.FullName).sha256"
                - uses: actions/upload-artifact@v4
                  with:
                    name: scbl-client-release
                    path: dist/*
                    if-no-files-found: error
                    retention-days: 7

            publish:
              needs: [metadata, build]
              if: needs.metadata.outputs.skip != 'true'
              runs-on: ubuntu-24.04
              steps:
                - uses: actions/checkout@v4
                  with: { fetch-depth: 0 }
                - uses: actions/download-artifact@v4
                  with: { name: scbl-client-release, path: dist }
                - name: Publish formal client release
                  env: { GH_TOKEN: '${{ github.token }}' }
                  shell: bash
                  run: |
                    set -euo pipefail
                    version='${{ needs.metadata.outputs.version }}'; tag='${{ needs.metadata.outputs.tag }}'
                    notes="docs/releases/CLIENT_v${version}.md"; test -f "$notes"
                    (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort) > SHA256SUMS.txt)
                    if gh release view "$tag" >/dev/null 2>&1; then
                      gh release upload "$tag" dist/* --clobber
                      gh release edit "$tag" --title "[CLIENT] Windows Client v${version}" --notes-file "$notes" --latest=false
                    else
                      gh release create "$tag" dist/* --title "[CLIENT] Windows Client v${version}" --notes-file "$notes" --latest=false --target main
                    fi
                    bash scripts/maintenance/prune_component_releases.sh client 2
          ''')

          write('.github/workflows/server-tool-release.yml', r'''
          name: Publish SCBL server tool

          on:
            push:
              branches: [main]
              paths:
                - VERSION_SERVER_TOOL
                - server/**
                - scripts/install-server.sh
                - docs/releases/SERVER_TOOL_v*.md
                - .github/workflows/server-tool-release.yml
            workflow_dispatch:
              inputs:
                version:
                  description: Server tool version; leave empty to use VERSION_SERVER_TOOL
                  required: false
                  type: string

          permissions:
            contents: write

          concurrency:
            group: scbl-server-tool-release
            cancel-in-progress: false

          jobs:
            metadata:
              runs-on: ubuntu-24.04
              outputs:
                version: ${{ steps.version.outputs.version }}
                tag: ${{ steps.version.outputs.tag }}
                skip: ${{ steps.version.outputs.skip }}
              steps:
                - uses: actions/checkout@v4
                  with: { fetch-depth: 2 }
                - id: version
                  env: { GH_TOKEN: '${{ github.token }}' }
                  shell: bash
                  run: |
                    set -euo pipefail
                    source_version="$(tr -d '\r\n ' < VERSION_SERVER_TOOL)"
                    requested='${{ inputs.version }}'; requested="${requested#v}"
                    [[ -n "$requested" ]] || requested="$source_version"
                    [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ && "$requested" == "$source_version" ]]
                    grep -Fq 'read_server_tool_version' server/install_public_server.sh
                    tag="server-tool-v$requested"; skip=false
                    if [[ "${GITHUB_EVENT_NAME}" == push ]] && gh release view "$tag" >/dev/null 2>&1; then
                      before='${{ github.event.before }}'; previous=""; pipeline_changed=false
                      if [[ -n "$before" && ! "$before" =~ ^0+$ ]] && git cat-file -e "$before^{commit}" 2>/dev/null; then
                        previous="$(git show "$before:VERSION_SERVER_TOOL" 2>/dev/null | tr -d '\r\n ' || true)"
                        git diff --name-only "$before" "$GITHUB_SHA" | grep -Fxq '.github/workflows/server-tool-release.yml' && pipeline_changed=true || true
                      fi
                      [[ "$previous" != "$requested" || "$pipeline_changed" == true ]] || skip=true
                    fi
                    echo "version=$requested" >> "$GITHUB_OUTPUT"
                    echo "tag=$tag" >> "$GITHUB_OUTPUT"
                    echo "skip=$skip" >> "$GITHUB_OUTPUT"

            build:
              needs: metadata
              if: needs.metadata.outputs.skip != 'true'
              runs-on: ubuntu-24.04
              steps:
                - uses: actions/checkout@v4
                  with: { fetch-depth: 0 }
                - name: Validate and package server tool
                  shell: bash
                  run: |
                    set -euo pipefail
                    version='${{ needs.metadata.outputs.version }}'
                    bash -n server/install_public_server.sh
                    bash -n scripts/install-server.sh
                    python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py server/test_ddns_go_native.py server/test_release_manifest_routing.py
                    python3 server/test_control_plane.py
                    python3 server/test_ddns_go_native.py
                    python3 server/test_release_manifest_routing.py
                    root="SCBL-Server-Tool-v${version}-linux-x86_64"
                    mkdir -p "stage/$root/THIRD_PARTY_LICENSES" dist
                    cp server/install_public_server.sh server/scbl_control_plane.py server/check_scbl_binary_release.sh \
                       server/5th-echelon_branch.txt scripts/install-server.sh VERSION_SERVER_TOOL VERSION_CLIENT \
                       COMPONENT_VERSIONS.json README.md CHANGELOG.md THIRD_PARTY_NOTICES.md "stage/$root/"
                    cp THIRD_PARTY_LICENSES/EasyTier-LGPL-3.0.txt "stage/$root/THIRD_PARTY_LICENSES/"
                    chmod 0755 "stage/$root/install_public_server.sh" "stage/$root/install-server.sh" "stage/$root/check_scbl_binary_release.sh"
                    package="${root}.tar.gz"
                    tar -C stage -czf "dist/$package" "$root"
                    package_sha="$(sha256sum "dist/$package" | awk '{print $1}')"
                    printf '%s  %s\n' "$package_sha" "$package" > "dist/${package}.sha256"
                    (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort) > SHA256SUMS.txt)
                - uses: actions/upload-artifact@v4
                  with:
                    name: scbl-server-tool-release
                    path: dist/*
                    if-no-files-found: error
                    retention-days: 7

            publish:
              needs: [metadata, build]
              if: needs.metadata.outputs.skip != 'true'
              runs-on: ubuntu-24.04
              steps:
                - uses: actions/checkout@v4
                  with: { fetch-depth: 0 }
                - uses: actions/download-artifact@v4
                  with: { name: scbl-server-tool-release, path: dist }
                - name: Publish formal server tool release
                  env: { GH_TOKEN: '${{ github.token }}' }
                  shell: bash
                  run: |
                    set -euo pipefail
                    version='${{ needs.metadata.outputs.version }}'; tag='${{ needs.metadata.outputs.tag }}'
                    notes="docs/releases/SERVER_TOOL_v${version}.md"; test -f "$notes"
                    if gh release view "$tag" >/dev/null 2>&1; then
                      gh release upload "$tag" dist/* --clobber
                      gh release edit "$tag" --title "[SERVER] Server Tool v${version}" --notes-file "$notes" --latest=false
                    else
                      gh release create "$tag" dist/* --title "[SERVER] Server Tool v${version}" --notes-file "$notes" --latest=false --target main
                    fi
                    bash scripts/maintenance/prune_component_releases.sh server-tool 2
          ''')

          # Update validation workflows for file-backed versions.
          validate_path = Path('.github/workflows/validate.yml')
          validate = validate_path.read_text(encoding='utf-8')
          validate = validate.replace("          compatibility_version=\"$(tr -d '\\r\\n ' < VERSION)\"\n", '')
          validate = validate.replace('          [[ "$compatibility_version" == "$client_version" ]]\n', '')
          validate = validate.replace('          grep -Fq "<ScblVersion>${client_version}</ScblVersion>" client/SCBL.Version.props\n', "          grep -Fq 'VERSION_CLIENT' client/SCBL.Version.props\n")
          validate = validate.replace('          grep -Fq "SERVER_TOOL_VERSION=\\\"${server_version}\\\"" server/install_public_server.sh\n', "          grep -Fq 'read_server_tool_version' server/install_public_server.sh\n")
          validate = validate.replace('          grep -Fq "SCBLControlPlane/${server_version}" server/scbl_control_plane.py\n', "          grep -Fq 'SCBLControlPlane/{SERVER_TOOL_VERSION}' server/scbl_control_plane.py\n")
          validate_path.write_text(validate, encoding='utf-8')

          build_path = Path('.github/workflows/build-client.yml')
          build = build_path.read_text(encoding='utf-8')
          build = build.replace("      - 'VERSION'\n", '')
          old = '''          $version = (Get-Content .\\VERSION_CLIENT -Raw).Trim()
                    $compat = (Get-Content .\\VERSION -Raw).Trim()
                    $props = Get-Content .\\client\\SCBL.Version.props -Raw
                    if ($version -ne $compat) { throw 'VERSION and VERSION_CLIENT do not match.' }
                    if ($props -notmatch "<ScblVersion>\\s*$([regex]::Escape($version))\\s*</ScblVersion>") {
                      throw 'VERSION_CLIENT and client/SCBL.Version.props do not match.'
                    }
          '''
          new = '''          $version = (Get-Content .\\VERSION_CLIENT -Raw).Trim()
                    if ($version -notmatch '^\\d+\\.\\d+\\.\\d+$') { throw 'VERSION_CLIENT is invalid.' }
                    $props = Get-Content .\\client\\SCBL.Version.props -Raw
                    if ($props -notmatch 'ReadAllText' -or $props -notmatch 'VERSION_CLIENT') {
                      throw 'Client projects must read VERSION_CLIENT through SCBL.Version.props.'
                    }
          '''
          if build.count(old) != 1:
              raise SystemExit('build-client version block mismatch')
          build_path.write_text(build.replace(old, new, 1), encoding='utf-8')

          maintenance_path = Path('.github/workflows/repository-maintenance.yml')
          maintenance = maintenance_path.read_text(encoding='utf-8')
          maintenance = maintenance.replace("              printf '%s\\n' client-stable-latest server-tool-stable-latest\n", '')
          maintenance = maintenance.replace("            echo '- Retention: only `main`, two immutable releases per component, and rolling stable tags.'", "            echo '- Retention: only `main` and the newest two formal releases per component.'")
          maintenance_path.write_text(maintenance, encoding='utf-8')

          # Current repo status docs should not advertise the removed channels.
          for name in ['docs/REPOSITORY_MAINTENANCE_STATUS.md', 'docs/REPOSITORY_BOOTSTRAP_STATUS.md']:
              path = Path(name)
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  text = text.replace('client-stable-latest', 'client-v1.0.0')
                  text = text.replace('server-tool-stable-latest', 'server-tool-v1.0.0')
                  text = text.replace('rolling stable', 'formal')
                  path.write_text(text, encoding='utf-8')
          PY

          gofmt -w client/scbl-process-router/main.go
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          bash -n scripts/maintenance/prune_component_releases.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py server/test_ddns_go_native.py server/test_release_manifest_routing.py
          python3 server/test_control_plane.py
          python3 server/test_ddns_go_native.py
          python3 server/test_release_manifest_routing.py
          python3 - <<'PY'
          from pathlib import Path
          for name in ['VERSION', 'VERSION_CLIENT', 'VERSION_SERVER_TOOL']:
              assert Path(name).read_text().strip() == '1.0.0'
          all_current = '\n'.join(Path(p).read_text(encoding='utf-8') for p in [
              'README.md', 'docs/RELEASE_ARCHITECTURE.md',
              '.github/workflows/client-release.yml', '.github/workflows/server-tool-release.yml',
              'server/install_public_server.sh', 'scripts/install-server.sh'])
          assert 'client-stable-latest' not in all_current
          assert 'server-tool-stable-latest' not in all_current
          assert '原子' not in all_current
          print('v1 release static checks passed')
          PY

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add VERSION VERSION_CLIENT VERSION_SERVER_TOOL COMPONENT_VERSIONS.json CHANGELOG.md README.md \
            client/scbl-process-router/main.go server docs .github/workflows scripts/maintenance
          git commit -m 'prepare SCBL client and server tool v1.0.0 formal releases'
          git push
