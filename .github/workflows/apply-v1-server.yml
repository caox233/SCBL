name: Apply v1 server version and package flow

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/apply-v1-server.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Apply server changes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          from textwrap import dedent

          manager_path = Path('server/install_public_server.sh')
          manager = manager_path.read_text(encoding='utf-8')

          def replace_function(text, name, next_name, replacement):
              pattern = rf'^{re.escape(name)}\(\) \{{.*?^\}}\n\n+(?={re.escape(next_name)}\(\))'
              updated, count = re.subn(pattern, dedent(replacement).strip() + '\n\n', text, count=1, flags=re.S | re.M)
              if count != 1:
                  raise SystemExit(f'failed to replace function {name}, matches={count}')
              return updated

          # The installed package carries VERSION_SERVER_TOOL. The manager reads it instead of
          # requiring a second hand-maintained version literal.
          manager = manager.replace('DEFAULT_SCBL_MIN_CLIENT_VERSION="0.6.0"\n', '')
          manager = manager.replace('SERVER_TOOL_VERSION="0.6.10"\n', '')
          manager = manager.replace('DEFAULT_CLIENT_RELEASE_TAG="client-stable-latest"\n', '')
          manager = manager.replace('DEFAULT_SERVER_TOOL_RELEASE_TAG="server-tool-stable-latest"\n', '')
          anchor = 'MANUAL_CLIENT_UPLOAD_DIR="$INCOMING_DIR/client-manual"\n'
          version_logic = dedent(r'''
          MANUAL_CLIENT_UPLOAD_DIR="$INCOMING_DIR/client-manual"

          read_server_tool_version() {
            local candidate value=""
            for candidate in \
              "$SCRIPT_DIR/VERSION_SERVER_TOOL" \
              "$SCRIPT_DIR/../VERSION_SERVER_TOOL" \
              "$MANAGER_DIR/VERSION_SERVER_TOOL"; do
              [[ -f "$candidate" ]] || continue
              value="$(tr -d '[:space:]' < "$candidate")"
              if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                printf '%s' "$value"
                return 0
              fi
            done
            printf '%s' "0.0.0"
          }
          SERVER_TOOL_VERSION="$(read_server_tool_version)"
          ''').strip() + '\n'
          if manager.count(anchor) != 1:
              raise SystemExit('manager version anchor mismatch')
          manager = manager.replace(anchor, version_logic, 1)

          # Remove the old hand-managed minimum-version setting everywhere, including generated
          # status scripts, summaries, environment files and install prompts.
          manager = '\n'.join(line for line in manager.splitlines() if 'SCBL_MIN_CLIENT_VERSION' not in line) + '\n'
          manager = re.sub(r'''\n      10\)\n        prompt_keep SCBL_MIN_CLIENT_VERSION.*?\n        ;;''', '', manager, count=1, flags=re.S)

          default_manifest_old = dedent('''
              cat > "$SCBL_ROOT/client-updates/client_update_manifest.json" <<JSONEOF
              {
                "version": "0.0.0",
                "updateMode": "file-delta",
                "filesBaseUrl": "",
                "fullPackage": "",
                "files": [],
                "delete": [],
                "keepLocal": ["logs/", "backup/", "updates/", "launcher_settings.json"],
                "release_notes": [],
                "updateAnnouncement": {"enabled": false}
              }
              JSONEOF
          ''').strip()
          default_manifest_new = dedent('''
              cat > "$SCBL_ROOT/client-updates/client_update_manifest.json" <<JSONEOF
              {
                "version": "0.0.0",
                "updateMode": "full-package",
                "fullPackage": "",
                "fullPackageSha256": "",
                "release_notes": [],
                "updateAnnouncement": {"enabled": false}
              }
              JSONEOF
          ''').strip()
          if manager.count(default_manifest_old) != 1:
              raise SystemExit('default client manifest block mismatch')
          manager = manager.replace(default_manifest_old, default_manifest_new, 1)

          manager = replace_function(manager, 'publish_client_update_package', 'manifest_value', r'''
          publish_client_update_package() {
            load_env_if_exists; set_defaults
            local package="${1:-}" notes=""
            if [[ -z "$package" ]]; then
              read -e -r -p "请输入客户端完整 ZIP 路径: " package || true
            fi
            [[ -f "$package" ]] || { echo "客户端安装包不存在：$package"; return 1; }
            if is_interactive; then
              read -e -r -p "请输入更新内容摘要（可直接回车）: " notes || true
            fi
            publish_client_update_package_auto "$package" "" "${notes:-正式客户端更新}"
          }
          ''')

          manager = replace_function(manager, 'download_latest_client_release', 'queue_client_package_from_file', r'''
          download_latest_client_release() {
            load_env_if_exists; set_defaults
            local repo="${SCBL_RELEASE_REPOSITORY:-$DEFAULT_SCBL_RELEASE_REPOSITORY}"
            local version_url="${SCBL_CLIENT_VERSION_URL:-https://raw.githubusercontent.com/${repo}/main/VERSION_CLIENT}"
            local version tag package base expected actual current cmp tmpdir staged

            echo "正在检查 GitHub 正式客户端版本..."
            version="$(curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 --retry-all-errors "$version_url" 2>/dev/null | tr -d '[:space:]' || true)"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "无法读取正式客户端版本。"
              return 1
            fi

            tag="client-v${version}"
            package="SCBL-Client-v${version}-win-x86.zip"
            base="${SCBL_CLIENT_PACKAGE_BASE_URL:-https://github.com/${repo}/releases/download/${tag}}"
            expected="$(curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 --retry-all-errors \
              "$base/${package}.sha256" 2>/dev/null | awk 'NF {print tolower($1); exit}' || true)"
            if [[ ! "$expected" =~ ^[0-9a-f]{64}$ ]]; then
              echo "客户端安装包校验信息读取失败。"
              return 1
            fi

            current="$(current_published_client_version)"
            if [[ -n "$current" && "$current" != "0.0.0" ]]; then
              cmp="$(semver_compare "$current" "$version")"
              if [[ "$cmp" == "1" ]]; then
                echo "服务器当前客户端 v$current 高于 GitHub 正式版 v$version，本次保留现有版本。"
                return 0
              fi
              if [[ "$cmp" == "0" && -f "$SCBL_ROOT/client-updates/full/$package" ]]; then
                actual="$(sha256sum "$SCBL_ROOT/client-updates/full/$package" | awk '{print tolower($1)}')"
                if [[ "$actual" == "$expected" ]]; then
                  echo "服务器客户端已经是正式版 v$version。"
                  return 0
                fi
              fi
            fi

            tmpdir="$(mktemp -d -t scbl-client-release.XXXXXX)"
            staged="$tmpdir/$package"
            echo "正在下载客户端 v$version 完整包..."
            if ! curl -fL --connect-timeout 10 --max-time 900 --retry 3 --retry-all-errors \
                "$base/$package" -o "$staged"; then
              rm -rf "$tmpdir"
              echo "客户端安装包下载失败，服务器现有版本没有改变。"
              return 1
            fi
            actual="$(sha256sum "$staged" | awk '{print tolower($1)}')"
            if [[ "$actual" != "$expected" ]]; then
              rm -rf "$tmpdir"
              echo "客户端安装包校验失败，请重新下载。"
              return 1
            fi
            if ! python3 - "$staged" <<'PYEOF_VALIDATE_CLIENT_ZIP'
          import sys, zipfile
          from pathlib import PurePosixPath
          path = sys.argv[1]
          with zipfile.ZipFile(path) as archive:
              names = []
              for item in archive.infolist():
                  p = PurePosixPath(item.filename.replace('\\', '/'))
                  if p.is_absolute() or '..' in p.parts:
                      raise SystemExit(f'unsafe client zip path: {item.filename}')
                  names.append(str(p).rstrip('/'))
              required = {'SplinterCellCNLauncher.exe', 'SCBL.Updater.exe'}
              found = {name.rsplit('/', 1)[-1] for name in names}
              missing = sorted(required - found)
              if missing:
                  raise SystemExit('client package missing: ' + ', '.join(missing))
          PYEOF_VALIDATE_CLIENT_ZIP
            then
              rm -rf "$tmpdir"
              echo "客户端安装包内容检查失败。"
              return 1
            fi

            if publish_client_update_package_auto "$staged" "$version" "正式客户端 v$version"; then
              rm -rf "$tmpdir"
              echo "服务器客户端已更新到 v$version。"
              return 0
            fi
            rm -rf "$tmpdir"
            return 1
          }
          ''')

          manager = replace_function(manager, 'update_server_tool_online', 'rollback_server_tool_latest', r'''
          update_server_tool_online() {
            load_env_if_exists; set_defaults
            local repo="${SCBL_RELEASE_REPOSITORY:-$DEFAULT_SCBL_RELEASE_REPOSITORY}"
            local version_url="${SCBL_SERVER_TOOL_VERSION_URL:-https://raw.githubusercontent.com/${repo}/main/VERSION_SERVER_TOOL}"
            local version tag package base expected actual cmp tmpdir extract_root manager_new control_new version_new
            local backup_root control_changed=0 binary_check_new branch_new package_root

            echo "正在检查 GitHub 正式服务端工具版本..."
            version="$(curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 --retry-all-errors "$version_url" 2>/dev/null | tr -d '[:space:]' || true)"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "无法读取正式服务端工具版本。"
              return 1
            fi
            cmp="$(semver_compare "$SERVER_TOOL_VERSION" "$version")"
            if [[ "$cmp" == "0" ]]; then
              echo "当前服务端工具已经是 v$version。"
              download_latest_client_release || echo "警告：客户端正式版检查失败，服务器现有客户端继续使用。"
              return 0
            elif [[ "$cmp" == "1" ]]; then
              echo "当前服务端工具 v$SERVER_TOOL_VERSION 高于 GitHub 正式版 v$version，本次不降级。"
              return 0
            fi

            tag="server-tool-v${version}"
            package="SCBL-Server-Tool-v${version}-linux-x86_64.tar.gz"
            base="${SCBL_SERVER_TOOL_PACKAGE_BASE_URL:-https://github.com/${repo}/releases/download/${tag}}"
            expected="$(curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 --retry-all-errors \
              "$base/${package}.sha256" 2>/dev/null | awk 'NF {print tolower($1); exit}' || true)"
            [[ "$expected" =~ ^[0-9a-f]{64}$ ]] || { echo "服务端工具校验信息读取失败。"; return 1; }

            tmpdir="$(mktemp -d -t scbl-server-tool.XXXXXX)"
            echo "正在下载服务端工具 v$version 完整包..."
            if ! curl -fL --connect-timeout 10 --max-time 600 --retry 3 --retry-all-errors \
                "$base/$package" -o "$tmpdir/$package"; then
              rm -rf "$tmpdir"; echo "服务端工具下载失败。"; return 1
            fi
            actual="$(sha256sum "$tmpdir/$package" | awk '{print tolower($1)}')"
            [[ "$actual" == "$expected" ]] || { rm -rf "$tmpdir"; echo "服务端工具文件校验失败。"; return 1; }

            extract_root="$tmpdir/extract"
            mkdir -p "$extract_root"
            python3 - "$tmpdir/$package" "$extract_root" <<'PYEOF_SAFE_SERVER_EXTRACT'
          import sys, tarfile
          from pathlib import Path, PurePosixPath
          archive_path, target = sys.argv[1:3]
          target_root = Path(target).resolve()
          with tarfile.open(archive_path, 'r:gz') as archive:
              members = archive.getmembers()
              for member in members:
                  member_path = PurePosixPath(member.name)
                  if member_path.is_absolute() or '..' in member_path.parts:
                      raise SystemExit(f'unsafe tar member path: {member.name}')
                  if member.issym() or member.islnk() or member.isdev():
                      raise SystemExit(f'unsafe tar member type: {member.name}')
                  destination = (target_root / Path(*member_path.parts)).resolve()
                  if destination != target_root and target_root not in destination.parents:
                      raise SystemExit(f'tar member escapes extraction root: {member.name}')
              archive.extractall(target_root, members=members)
          PYEOF_SAFE_SERVER_EXTRACT

            package_root="$(find "$extract_root" -mindepth 1 -maxdepth 1 -type d -name 'SCBL-Server-Tool-v*-linux-x86_64' -print -quit)"
            manager_new="${package_root}/install_public_server.sh"
            control_new="${package_root}/scbl_control_plane.py"
            version_new="${package_root}/VERSION_SERVER_TOOL"
            [[ -f "$manager_new" && -f "$control_new" && -f "$version_new" ]] || {
              rm -rf "$tmpdir"; echo "服务端工具包缺少必要文件。"; return 1;
            }
            [[ "$(tr -d '[:space:]' < "$version_new")" == "$version" ]] || {
              rm -rf "$tmpdir"; echo "服务端工具包版本信息不一致。"; return 1;
            }
            validate_manager_script_file "$manager_new"
            python3 -m py_compile "$control_new"

            backup_root="$SCBL_ROOT/backups/server-tool/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$backup_root"
            [[ -f "$MANAGER_SCRIPT" ]] && cp -a "$MANAGER_SCRIPT" "$backup_root/install_public_server.sh"
            [[ -f "$MANAGER_DIR/VERSION_SERVER_TOOL" ]] && cp -a "$MANAGER_DIR/VERSION_SERVER_TOOL" "$backup_root/VERSION_SERVER_TOOL"
            [[ -f "$SCBL_ROOT/server/scbl_control_plane.py" ]] && cp -a "$SCBL_ROOT/server/scbl_control_plane.py" "$backup_root/scbl_control_plane.py"
            [[ -f "$SCBL_ROOT/server/check_scbl_binary_release.sh" ]] && cp -a "$SCBL_ROOT/server/check_scbl_binary_release.sh" "$backup_root/check_scbl_binary_release.sh"
            [[ -f "$SCBL_ROOT/server/5th-echelon_branch.txt" ]] && cp -a "$SCBL_ROOT/server/5th-echelon_branch.txt" "$backup_root/5th-echelon_branch.txt"

            if [[ ! -f "$SCBL_ROOT/server/scbl_control_plane.py" ]] || ! cmp -s "$control_new" "$SCBL_ROOT/server/scbl_control_plane.py"; then
              control_changed=1
            fi

            if ! {
              install -m 0755 "$manager_new" "$MANAGER_SCRIPT"
              install -m 0644 "$version_new" "$MANAGER_DIR/VERSION_SERVER_TOOL"
              install -d -m 0755 "$SCBL_ROOT/server"
              install -m 0644 "$control_new" "$SCBL_ROOT/server/scbl_control_plane.py"
              binary_check_new="$(find "$package_root" -type f -name check_scbl_binary_release.sh -print -quit)"
              branch_new="$(find "$package_root" -type f -name 5th-echelon_branch.txt -print -quit)"
              [[ -z "$binary_check_new" ]] || install -m 0755 "$binary_check_new" "$SCBL_ROOT/server/check_scbl_binary_release.sh"
              [[ -z "$branch_new" ]] || install -m 0644 "$branch_new" "$SCBL_ROOT/server/5th-echelon_branch.txt"
              python3 - "$SCBL_ROOT/server-tool-version.json" "$version" "$tag" "$actual" <<'PYEOF_SERVER_TOOL_STATE'
          import json, sys
          from datetime import datetime, timezone
          path, version, tag, digest = sys.argv[1:5]
          with open(path, 'w', encoding='utf-8') as handle:
              json.dump({'version': version, 'releaseTag': tag, 'installedAt': datetime.now(timezone.utc).isoformat(), 'source': 'github-release', 'packageSha256': digest}, handle, ensure_ascii=False, indent=2)
          PYEOF_SERVER_TOOL_STATE
              if [[ "$control_changed" == "1" ]]; then
                systemctl restart scbl-control-plane.service
                sleep 2
                systemctl is-active --quiet scbl-control-plane.service
              fi
            }; then
              echo "升级失败，正在恢复服务端工具..."
              [[ -f "$backup_root/install_public_server.sh" ]] && install -m 0755 "$backup_root/install_public_server.sh" "$MANAGER_SCRIPT"
              [[ -f "$backup_root/VERSION_SERVER_TOOL" ]] && install -m 0644 "$backup_root/VERSION_SERVER_TOOL" "$MANAGER_DIR/VERSION_SERVER_TOOL"
              [[ -f "$backup_root/scbl_control_plane.py" ]] && install -m 0644 "$backup_root/scbl_control_plane.py" "$SCBL_ROOT/server/scbl_control_plane.py"
              systemctl restart scbl-control-plane.service 2>/dev/null || true
              rm -rf "$tmpdir"
              return 1
            fi

            find "$SCBL_ROOT/backups/server-tool" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' 2>/dev/null |
              sort -nr | awk 'NR>5 {sub(/^[^ ]+ /, ""); print}' | xargs -r rm -rf
            rm -rf "$tmpdir"
            echo "SCBL 服务端工具已升级到 v$version。"
            echo "现有配置、数据库、客户端更新数据和 DDNS-GO 配置均已保留。"
            download_latest_client_release || echo "警告：客户端正式版检查失败，服务器现有客户端继续使用。"
          }
          ''')

          manager = replace_function(manager, 'publish_client_update_package_auto', 'write_package_watcher_files', r'''
          publish_client_update_package_auto() {
            load_env_if_exists; set_defaults
            local package="$1" version notes updates_root
            version="${2:-$(infer_version_from_name "$package")}"; version="${version#v}"; version="${version#V}"
            notes="${3:-正式客户端更新}"
            [[ -f "$package" ]] || { echo "客户端安装包不存在：$package"; return 1; }
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "无法从文件名识别客户端版本，请使用 SCBL-Client-vX.Y.Z-win-x86.zip。"
              return 1
            fi

            updates_root="$SCBL_ROOT/client-updates"
            mkdir -p "$updates_root/full"
            python3 - "$package" "$version" "$updates_root" "$notes" <<'PYEOF_AUTO_CLIENT'
          import hashlib, json, re, shutil, sys, zipfile
          from pathlib import Path, PurePosixPath

          package = Path(sys.argv[1]).resolve()
          version = sys.argv[2].strip().lstrip('vV')
          updates_root = Path(sys.argv[3]).resolve()
          notes = sys.argv[4].strip()
          if not re.fullmatch(r'[0-9]+\.[0-9]+\.[0-9]+', version):
              raise SystemExit('invalid client version')
          expected_name = f'SCBL-Client-v{version}-win-x86.zip'
          if package.name != expected_name:
              raise SystemExit(f'client package filename must be {expected_name}')

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          with zipfile.ZipFile(package) as archive:
              names = []
              for item in archive.infolist():
                  path = PurePosixPath(item.filename.replace('\\', '/'))
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe client zip path: {item.filename}')
                  names.append(str(path).rstrip('/'))
              found = {name.rsplit('/', 1)[-1] for name in names}
              required = {'SplinterCellCNLauncher.exe', 'SCBL.Updater.exe'}
              missing = sorted(required - found)
              if missing:
                  raise SystemExit('client package missing: ' + ', '.join(missing))

          full_dir = updates_root / 'full'
          full_dir.mkdir(parents=True, exist_ok=True)
          destination = full_dir / expected_name
          temp = destination.with_suffix(destination.suffix + '.tmp')
          shutil.copy2(package, temp)
          temp.replace(destination)
          digest = sha256_file(destination)

          announcement_path = updates_root / 'update_announcement.json'
          try:
              announcement = json.loads(announcement_path.read_text(encoding='utf-8'))
          except Exception:
              announcement = {'enabled': False}
          configured = str(announcement.get('version', '')).strip().lstrip('vV')
          if not announcement.get('enabled', False) or (configured and configured != version):
              announcement = {'enabled': False}
          elif not configured:
              announcement['version'] = version
              announcement_path.write_text(json.dumps(announcement, ensure_ascii=False, indent=2), encoding='utf-8')

          release_notes = [notes] if notes else []
          if announcement.get('enabled', False):
              title = str(announcement.get('title', '')).strip()
              body = str(announcement.get('body', '')).strip()
              release_notes = ([title] if title else []) + [line.strip() for line in body.splitlines() if line.strip()]

          manifest_path = updates_root / 'client_update_manifest.json'
          previous = updates_root / 'client_update_manifest.previous.json'
          if manifest_path.exists():
              shutil.copy2(manifest_path, previous)
          manifest = {
              'version': version,
              'updateMode': 'full-package',
              'fullPackage': f'full/{expected_name}',
              'fullPackageSha256': digest,
              'release_notes': release_notes,
              'updateAnnouncement': announcement,
          }
          manifest_tmp = manifest_path.with_suffix('.json.tmp')
          manifest_tmp.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          manifest_tmp.replace(manifest_path)

          packages = []
          pattern = re.compile(r'^SCBL-Client-v(\d+\.\d+\.\d+)-win-x86\.zip$')
          for item in full_dir.iterdir():
              match = pattern.fullmatch(item.name)
              if item.is_file() and match:
                  packages.append((tuple(map(int, match.group(1).split('.'))), item))
          for _, old in sorted(packages, reverse=True)[2:]:
              old.unlink()
          files_dir = updates_root / 'files'
          if files_dir.exists():
              shutil.rmtree(files_dir)

          print(f'客户端更新包已发布：v{version}')
          print(f'完整包：{destination}')
          print(f'SHA256：{digest}')
          PYEOF_AUTO_CLIENT

            chmod -R a+rX "$updates_root" || true
            write_update_server_files
            systemctl daemon-reload
            systemctl enable scbl-update.service >/dev/null 2>&1 || true
            systemctl restart scbl-update.service || true
            systemctl restart scbl-package-watch.timer || true
          }
          ''')

          # Update status output for the full-package-only format.
          status_old = '''print(f"  更新模式：{data.get('updateMode', '未知')}")
          print(f"  文件数量：{len(data.get('files', []))}")
          print(f"  删除清单：{len(data.get('delete', []))}")
          print(f"  完整包：{data.get('fullPackage', '未知')}")'''
          status_new = '''print(f"  更新方式：完整包")
          print(f"  完整包：{data.get('fullPackage', '未知')}")
          digest = str(data.get('fullPackageSha256', '')).strip()
          print(f"  文件校验：{digest or '未知'}")'''
          if manager.count(status_old) != 1:
              raise SystemExit('client status output block mismatch')
          manager = manager.replace(status_old, status_new, 1)
          manager = manager.replace('echo "客户端包已校验并原子投递：$target"', 'echo "客户端安装包已加入发布队列：$target"')
          manager = manager.replace('echo "已投递：$target"', 'echo "客户端安装包已加入发布队列：$target"')
          manager = manager.replace('文件级差量', '客户端')
          manager = manager.replace('manifest 对比 SHA256，只下载缺失或变化的文件', '完整包方式检查并更新')

          # Automatically make a formal client package available during first installation.
          install_anchor = '''  backup_env
            write_env
            echo
            echo "部署完成。"
          '''
          install_replacement = '''  backup_env
            write_env

            stage "检查客户端正式版本"
            if ! download_latest_client_release; then
              current_client="$(current_published_client_version)"
              if [[ -z "$current_client" || "$current_client" == "0.0.0" ]]; then
                echo "部署未完成：没有可用的客户端安装包，请检查服务器到 GitHub 的网络连接后重试。"
                return 1
              fi
              echo "警告：正式客户端检查失败，继续使用服务器现有客户端 v$current_client。"
            fi
            echo
            echo "部署完成。"
          '''
          if manager.count(install_anchor) != 1:
              raise SystemExit('install client sync anchor mismatch')
          manager = manager.replace(install_anchor, install_replacement, 1)

          manager_path.write_text(manager, encoding='utf-8')

          # Control plane reads the currently published client version. It is not a manual setting.
          control_path = Path('server/scbl_control_plane.py')
          control = control_path.read_text(encoding='utf-8')
          control = control.replace('MIN_CLIENT_VERSION = os.environ.get("SCBL_MIN_CLIENT_VERSION", "0.6.0").strip()\n', '')
          control = control.replace('SERVER_TOOL_VERSION = os.environ.get("SCBL_SERVER_TOOL_VERSION", "0.6.10").strip()', 'SERVER_TOOL_VERSION = os.environ.get("SCBL_SERVER_TOOL_VERSION", "0.0.0").strip()')
          helper_anchor = 'def version_tuple(value: str) -> tuple[int, int, int]:\n'
          helper = dedent('''
          def required_client_version() -> str:
              manifest = SCBL_ROOT / "client-updates" / "client_update_manifest.json"
              try:
                  data = json.loads(manifest.read_text(encoding="utf-8-sig"))
                  value = clean_text(data.get("version"), 32).lstrip("vV")
              except Exception:
                  return ""
              return value if re.fullmatch(r"\\d+\\.\\d+\\.\\d+", value) and value != "0.0.0" else ""


          ''')
          if control.count(helper_anchor) != 1:
              raise SystemExit('control plane version helper anchor mismatch')
          control = control.replace(helper_anchor, helper + helper_anchor, 1)
          old_payload = '''            self.send_json(
                          HTTPStatus.OK,
                          {
                              "serverToolVersion": SERVER_TOOL_VERSION,
                              "minimumClientVersion": MIN_CLIENT_VERSION,
                              "clientVersionAccepted": version_tuple(client_version) >= version_tuple(MIN_CLIENT_VERSION),
                              "maintenance": MAINTENANCE,
          '''
          new_payload = '''            required_version = required_client_version()
                      accepted = bool(required_version) and version_tuple(client_version) == version_tuple(required_version)
                      self.send_json(
                          HTTPStatus.OK,
                          {
                              "serverToolVersion": SERVER_TOOL_VERSION,
                              "requiredClientVersion": required_version,
                              "clientVersionAccepted": accepted,
                              "updateRequired": not accepted,
                              "maintenance": MAINTENANCE,
          '''
          if control.count(old_payload) != 1:
              raise SystemExit('control plane bootstrap payload mismatch')
          control = control.replace(old_payload, new_payload, 1)
          control_path.write_text(control, encoding='utf-8')

          # Direct full-package bootstrap installer.
          Path('scripts/install-server.sh').write_text(dedent(r'''#!/usr/bin/env bash
          set -euo pipefail

          REPO="${SCBL_GITHUB_REPO:-caox233/SCBL}"
          VERSION_URL="${SCBL_SERVER_TOOL_VERSION_URL:-https://raw.githubusercontent.com/${REPO}/main/VERSION_SERVER_TOOL}"
          TMP="$(mktemp -d -t scbl-server-install.XXXXXX)"
          MANAGER_DIR="/usr/local/lib/scbl-public"
          MANAGER_TARGET="${MANAGER_DIR}/install_public_server.sh"
          cleanup() { rm -rf "$TMP"; }
          trap cleanup EXIT

          if [[ ${EUID:-$(id -u)} -ne 0 ]]; then
            echo "请使用 root 运行。" >&2
            exit 1
          fi
          for cmd in curl sha256sum python3 timeout install; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "缺少必要命令：$cmd" >&2; exit 1; }
          done
          case "$(uname -m)" in x86_64|amd64) ;; *) echo "当前安装包仅支持 Linux x86_64。" >&2; exit 1 ;; esac

          echo "[SCBL] 正在检查正式版本..."
          version="$(curl -fsSL --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 "$VERSION_URL" | tr -d '[:space:]')"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "无法读取正式版本。" >&2; exit 1; }
          tag="server-tool-v${version}"
          package="SCBL-Server-Tool-v${version}-linux-x86_64.tar.gz"
          base="${SCBL_SERVER_TOOL_PACKAGE_BASE_URL:-https://github.com/${REPO}/releases/download/${tag}}"

          echo "[SCBL] 正在下载服务端工具 v${version}..."
          timeout --foreground 600s curl -fL --retry 3 --retry-all-errors --connect-timeout 10 --max-time 600 "$base/$package" -o "$TMP/$package"
          expected="$(timeout --foreground 60s curl -fsSL --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 "$base/${package}.sha256" | awk 'NF {print tolower($1); exit}')"
          actual="$(sha256sum "$TMP/$package" | awk '{print tolower($1)}')"
          [[ "$expected" =~ ^[0-9a-f]{64}$ && "$actual" == "$expected" ]] || { echo "服务端工具文件校验失败。" >&2; exit 1; }

          mkdir -p "$TMP/extract"
          python3 - "$TMP/$package" "$TMP/extract" <<'PYEOF_SAFE_BOOTSTRAP_EXTRACT'
          import sys, tarfile
          from pathlib import Path, PurePosixPath
          archive_path, target = sys.argv[1:3]
          target_root = Path(target).resolve()
          with tarfile.open(archive_path, 'r:gz') as archive:
              members = archive.getmembers()
              for member in members:
                  p = PurePosixPath(member.name)
                  if p.is_absolute() or '..' in p.parts or not (member.isfile() or member.isdir()):
                      raise SystemExit(f'unsafe archive entry: {member.name}')
                  destination = (target_root / Path(*p.parts)).resolve()
                  if destination != target_root and target_root not in destination.parents:
                      raise SystemExit(f'archive entry escapes target: {member.name}')
              archive.extractall(target_root, members=members)
          PYEOF_SAFE_BOOTSTRAP_EXTRACT

          package_root="$(find "$TMP/extract" -mindepth 1 -maxdepth 1 -type d -name 'SCBL-Server-Tool-v*-linux-x86_64' -print -quit)"
          [[ -n "$package_root" ]] || { echo "服务端工具包目录不正确。" >&2; exit 1; }
          installer="$package_root/install_public_server.sh"
          version_file="$package_root/VERSION_SERVER_TOOL"
          [[ -f "$installer" && -f "$version_file" ]] || { echo "服务端工具包缺少必要文件。" >&2; exit 1; }
          [[ "$(tr -d '[:space:]' < "$version_file")" == "$version" ]] || { echo "服务端工具包版本不一致。" >&2; exit 1; }
          bash -n "$installer"
          python3 - "$installer" <<'PYEOF_VALIDATE_BOOTSTRAP_MANAGER'
          from pathlib import Path
          import re, sys
          text = Path(sys.argv[1]).read_text(encoding='utf-8')
          blocks = re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S)
          if not blocks:
              raise SystemExit('manager script has no embedded Python blocks')
          for marker, block in blocks:
              compile(block, marker, 'exec')
          PYEOF_VALIDATE_BOOTSTRAP_MANAGER

          install -d -m 0755 "$MANAGER_DIR"
          install -m 0755 "$installer" "$MANAGER_TARGET"
          install -m 0644 "$version_file" "$MANAGER_DIR/VERSION_SERVER_TOOL"
          for asset in scbl_control_plane.py check_scbl_binary_release.sh 5th-echelon_branch.txt; do
            [[ -f "$package_root/$asset" ]] || continue
            case "$asset" in *.sh) mode=0755 ;; *) mode=0644 ;; esac
            install -m "$mode" "$package_root/$asset" "$MANAGER_DIR/$asset"
          done

          cat > /usr/local/bin/SCBL <<'SCBL_COMMAND'
          #!/usr/bin/env bash
          set -e
          MANAGER="/usr/local/lib/scbl-public/install_public_server.sh"
          if [[ ! -f "$MANAGER" ]]; then echo "SCBL 管理脚本不存在：$MANAGER" >&2; exit 1; fi
          if [[ ${EUID:-$(id -u)} -eq 0 ]]; then exec bash "$MANAGER" "$@"; fi
          if command -v sudo >/dev/null 2>&1; then exec sudo bash "$MANAGER" "$@"; fi
          echo "请使用 root 登录，或安装 sudo 后再执行 SCBL。" >&2
          exit 1
          SCBL_COMMAND
          chmod 0755 /usr/local/bin/SCBL
          ln -sfn /usr/local/bin/SCBL /usr/local/bin/scbl

          echo "[SCBL] 服务端管理工具 v${version} 已安装。"
          if [[ -t 0 && -t 1 ]]; then
            exec bash "$MANAGER_TARGET"
          fi
          echo "请继续执行：SCBL"
          '''), encoding='utf-8')

          # User-facing output should avoid implementation jargon.
          for path in [manager_path, Path('scripts/install-server.sh')]:
              text = path.read_text(encoding='utf-8').replace('原子', '').replace('immutable', '正式')
              path.write_text(text, encoding='utf-8')

          # Static source checks.
          source = manager_path.read_text(encoding='utf-8')
          for forbidden in ['SCBL_MIN_CLIENT_VERSION', 'client-stable-latest', 'server-tool-stable-latest', '请输入客户端版本号', 'file-delta', 'filesBaseUrl']:
              if forbidden in source:
                  raise SystemExit(f'old server marker remains: {forbidden}')
          for required in ['VERSION_CLIENT', 'VERSION_SERVER_TOOL', "'updateMode': 'full-package'", "'fullPackageSha256': digest", 'download_latest_client_release']:
              if required not in source:
                  raise SystemExit(f'missing server marker: {required}')
          PY

          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 -m py_compile server/scbl_control_plane.py
          python3 - <<'PY'
          from pathlib import Path
          import re
          for name in ['server/install_public_server.sh', 'scripts/install-server.sh']:
              text = Path(name).read_text(encoding='utf-8')
              for marker, block in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
                  compile(block, f'{name}:{marker}', 'exec')
          print('embedded Python validation passed')
          PY

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server scripts
          git commit -m 'simplify server version and full-package updates'
          git push
