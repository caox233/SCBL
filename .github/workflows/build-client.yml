# CI verification trigger after initial v0.6.0 publication.
name: Build Windows client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'THIRD_PARTY_LICENSES/**'
      - 'VERSION'
      - '.github/workflows/build-client.yml'
  pull_request:
    paths:
      - 'client/**'
      - 'THIRD_PARTY_LICENSES/**'
      - 'VERSION'
      - '.github/workflows/build-client.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'

      - name: Verify source version
        shell: pwsh
        run: |
          $version = (Get-Content .\VERSION -Raw).Trim()
          $props = Get-Content .\client\SCBL.Version.props -Raw
          if ($props -notmatch "<ScblVersion>\s*$([regex]::Escape($version))\s*</ScblVersion>") {
            throw "VERSION and client/SCBL.Version.props do not match."
          }

      - name: Build complete Windows client
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\client\build_all_windows.ps1
          .\client\create_client_full_package.ps1 -OutputDir "$env:GITHUB_WORKSPACE\dist"

      - name: Generate checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem .\dist\SCBL-Client-v*-win-x86.zip | Select-Object -Single
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Set-Content -Encoding ascii "$($zip.FullName).sha256"
          Get-ChildItem .\dist | Format-Table Name, Length

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: SCBL-Windows-client
          path: |
            dist/SCBL-Client-v*-win-x86.zip
            dist/SCBL-Client-v*-win-x86.zip.sha256
          if-no-files-found: error
          retention-days: 14
