name: Build Windows client

on:
  pull_request:
    paths:
      - 'client/**'
      - 'THIRD_PARTY_LICENSES/**'
      - 'VERSION'
      - 'VERSION_CLIENT'
      - '.github/workflows/build-client.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scbl-client-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true
          cache-dependency-path: client/scbl-process-router/go.sum

      - name: Resolve Hooks checksum
        id: hooks
        shell: pwsh
        run: |
          $uri = 'https://github.com/caox233/5th-echelon/releases/download/scbl-public-stable-latest/uplay_r1_loader.dll.sha256'
          $text = (Invoke-WebRequest -UseBasicParsing -Uri $uri).Content
          $match = [regex]::Match($text, '(?i)\b[0-9a-f]{64}\b')
          if (!$match.Success) { throw 'Hooks checksum is invalid.' }
          "sha=$($match.Value.ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('client/**/*.csproj', 'client/**/*.props', 'client/**/*.targets') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache pinned client runtimes
        uses: actions/cache@v4
        with:
          path: |
            client/easytier/bin
            client/scbl-process-router/WinDivert.dll
            client/scbl-process-router/WinDivert64.sys
          key: client-runtime-${{ runner.os }}-${{ hashFiles('client/easytier/download_easytier_windows.ps1', 'client/scbl-process-router/download_windivert.ps1') }}

      - name: Cache Hooks DLL
        uses: actions/cache@v4
        with:
          path: client/ScblPublicLauncher/EmbeddedFiles/uplay_r1_loader.dll
          key: hooks-win-x86-${{ steps.hooks.outputs.sha }}

      - name: Verify source version
        shell: pwsh
        run: |
          $version = (Get-Content .\VERSION_CLIENT -Raw).Trim()
          $props = Get-Content .\client\SCBL.Version.props -Raw
          if ($props -notmatch "<ScblVersion>\s*$([regex]::Escape($version))\s*</ScblVersion>") {
            throw 'VERSION_CLIENT and client/SCBL.Version.props do not match.'
          }

      - name: Build and package client once
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\client\build_all_windows.ps1 -Fast -Package -OutputDir "$env:GITHUB_WORKSPACE\dist"

      - name: Generate checksum
        shell: pwsh
        run: |
          $zips = @(Get-ChildItem .\dist\SCBL-Client-v*-win-x86.zip)
          if ($zips.Count -ne 1) { throw "Expected exactly one client ZIP, found $($zips.Count)." }
          $zip = $zips[0]
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Set-Content -Encoding ascii "$($zip.FullName).sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: SCBL-Windows-client
          path: |
            dist/SCBL-Client-v*-win-x86.zip
            dist/SCBL-Client-v*-win-x86.zip.sha256
          if-no-files-found: error
          retention-days: 7
