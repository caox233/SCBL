name: Check v0.6.4 server scripts

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    if: github.head_ref == 'server-tool-v064-retry'
    runs-on: ubuntu-24.04
    steps:
      - name: Validate shell and embedded Python
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --branch server-tool-v064-retry --single-branch https://github.com/${{ github.repository }} work
          cd work
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re
          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              blocks = re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S)
              print(f'{path}: blocks={len(blocks)}')
              if not blocks:
                  raise SystemExit(f'{path}: no embedded Python heredocs found')
              for marker, source in blocks:
                  try:
                      compile(source, f'{path}:{marker}', 'exec')
                  except Exception as exc:
                      print(f'FAILED {path}:{marker}: {exc}')
                      print(source)
                      raise
                  print(f'OK {path}:{marker}')
          PY
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py
