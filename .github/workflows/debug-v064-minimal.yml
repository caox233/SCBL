name: Check v0.6.4 embedded Python

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    if: github.head_ref == 'server-tool-v064-retry'
    runs-on: ubuntu-24.04
    steps:
      - name: Compile embedded Python blocks
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --branch server-tool-v064-retry --single-branch https://github.com/${{ github.repository }} work
          cd work
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('server/install_public_server.sh')
          text = path.read_text(encoding='utf-8')
          blocks = re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S)
          print(f'blocks={len(blocks)}')
          for marker, source in blocks:
              try:
                  compile(source, f'{path}:{marker}', 'exec')
              except Exception as exc:
                  print(f'FAILED {marker}: {exc}')
                  print(source)
                  raise
              print(f'OK {marker}')
          PY
