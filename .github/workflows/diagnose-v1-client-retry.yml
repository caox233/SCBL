name: Diagnose v1 client retry

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/diagnose-v1-client-retry.yml'

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
      - name: Capture retry workflow log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="$(gh run list --workflow retry-v1-client.yml --branch agent/release-v1.0.0 --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          {
            echo "run_id=$run_id"
            if [[ -n "$run_id" ]]; then
              gh run view "$run_id" --json status,conclusion,url,jobs
              echo '--- failed log ---'
              gh run view "$run_id" --log-failed || true
            else
              echo 'No run found.'
            fi
          } > docs/_tmp_v1_client_retry_diagnosis.txt 2>&1
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/_tmp_v1_client_retry_diagnosis.txt
          git commit -m 'record v1 client retry diagnosis'
          git push
