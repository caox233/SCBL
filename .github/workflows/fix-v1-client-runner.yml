name: Fix v1 client validation runner

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/fix-v1-client-runner.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
      - name: Enable Windows targeting on Linux validation
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/apply-v1-client.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj --runtime win-x86
                    dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -r win-x86 --no-restore --nologo
          '''
          new = '''          dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj --runtime win-x86 -p:EnableWindowsTargeting=true
                    dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -r win-x86 --no-restore --nologo -p:EnableWindowsTargeting=true
          '''
          if text.count(old) != 1:
              raise SystemExit('client validation command block not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .github/workflows/apply-v1-client.yml
          git commit -m 'ci: enable Windows targeting for client patch validation'
          git push
