name: Align package creator with VERSION_CLIENT

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/fix3-v1-version-source.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
      - name: Use VERSION_CLIENT in package creator
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('client/create_client_full_package.ps1')
          text = path.read_text(encoding='utf-8-sig')
          pattern = r'''function Get-ScblSourceVersion \{.*?^\}'''
          replacement = '''function Get-ScblSourceVersion {
              $VersionFile = Join-Path -Path $PSScriptRoot -ChildPath "..\\VERSION_CLIENT"
              if (!(Test-Path -LiteralPath $VersionFile)) { throw "Client version file was not found: $VersionFile" }
              $Value = (Get-Content -LiteralPath $VersionFile -Raw -Encoding UTF8).Trim()
              if ($Value -notmatch '^[0-9]+\\.[0-9]+\\.[0-9]+$') { throw "VERSION_CLIENT must contain a three-part numeric version." }
              return $Value
          }'''
          updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=re.S | re.M)
          if count != 1:
              raise SystemExit(f'package version function matches={count}')
          path.write_text(updated, encoding='utf-8')
          PY
          pwsh -NoProfile -Command '$tokens=$null; $errors=$null; [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "client/create_client_full_package.ps1"), [ref]$tokens, [ref]$errors); if ($errors.Count -gt 0) { throw $errors[0].Message }'
          grep -Fq 'VERSION_CLIENT' client/create_client_full_package.ps1
          ! grep -Fq 'SCBL.Version.props must contain' client/create_client_full_package.ps1
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add client/create_client_full_package.ps1
          git commit -m 'build: use VERSION_CLIENT when naming client packages'
          git push
