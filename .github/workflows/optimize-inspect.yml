name: Inspect build and release integration points

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/optimize-inspect.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Collect integration points
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p inspect/source/server
          grep -n -C 18 -E 'DEFAULT_CLIENT_RELEASE_TAG|CLIENT_RELEASE_TAG|client-stable-latest|client-release-manifest|SCBL-Client-v|DEFAULT_SERVER_TOOL_RELEASE_TAG|server-tool-stable-latest' server/install_public_server.sh > inspect/server-release-points.txt || true
          grep -RIn -C 8 -E 'client-stable-latest|server-tool-stable-latest|client-release-manifest|server-tool-release-manifest|SCBL-Client-v|SCBL-Server-Tool-latest' client server scripts .github/workflows > inspect/all-release-points.txt || true
          cp server/install_public_server.sh inspect/source/server/
          cp client/build_all_windows.ps1 inspect/source/
          cp client/create_client_full_package.ps1 inspect/source/
          cp client/easytier/download_easytier_windows.ps1 inspect/source/
          cp scripts/install-server.sh inspect/source/
          cp .github/workflows/build-client.yml inspect/source/
          cp .github/workflows/client-release.yml inspect/source/
          cp .github/workflows/server-tool-release.yml inspect/source/
      - uses: actions/upload-artifact@v4
        with:
          name: scbl-build-release-inspection
          path: inspect
          retention-days: 3
          if-no-files-found: error
