name: Export SCBL v0.6.3 source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/v0.6.2-stability'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.6.2-stability
          fetch-depth: 0
      - uses: actions/upload-artifact@v4
        with:
          name: scbl-v0.6.3-source-export
          path: |
            server/install_public_server.sh
            server/scbl_control_plane.py
            client/scbl-process-router/main.go
            .github/workflows/client-release.yml
            .github/workflows/server-tool-release.yml
            docs/RELEASE_ARCHITECTURE.md
            docs/releases/CLIENT_v0.6.3.md
            docs/releases/SERVER_TOOL_v0.6.3.md
            COMPONENT_VERSIONS.json
            VERSION_CLIENT
            VERSION_SERVER_TOOL
          if-no-files-found: error
