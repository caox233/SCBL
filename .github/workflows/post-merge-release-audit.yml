name: Audit optimized rolling Releases

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/post-merge-release-audit.yml'

permissions:
  contents: read
  actions: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Wait for release workflows and verify assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: '085823fc3cc9269f5516646da42c3a8c463748b4'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit/client-stable audit/server-stable

          wait_for_workflow() {
            local workflow="$1" result=""
            for _ in $(seq 1 60); do
              result="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --limit 30 \
                --json databaseId,headSha,status,conclusion,url \
                --jq ".[] | select(.headSha == \"$RELEASE_SHA\") | [.databaseId,.status,(.conclusion // \"\"),.url] | @tsv" | head -1)"
              if [[ -n "$result" ]]; then
                printf '%s\n' "$result"
                status="$(cut -f2 <<<"$result")"
                if [[ "$status" == completed ]]; then
                  conclusion="$(cut -f3 <<<"$result")"
                  [[ "$conclusion" == success ]] || { echo "$workflow failed: $result" >&2; exit 1; }
                  return 0
                fi
              fi
              sleep 5
            done
            echo "Timed out waiting for $workflow at $RELEASE_SHA" >&2
            exit 1
          }

          {
            echo 'Client release workflow:'
            wait_for_workflow client-release.yml
            echo 'Server Tool release workflow:'
            wait_for_workflow server-tool-release.yml
          } | tee audit/workflow-results.txt

          release_assets() {
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$1" --jq '.assets[].name' | sort
          }

          release_assets client-stable-latest > audit/client-stable-assets.txt
          release_assets client-v0.6.3 > audit/client-immutable-assets.txt
          release_assets server-tool-stable-latest > audit/server-stable-assets.txt
          release_assets server-tool-v0.6.9 > audit/server-immutable-assets.txt

          printf '%s\n' client-release-manifest.json > audit/expected-client-stable.txt
          printf '%s\n' install-server.sh server-tool-release-manifest.json | sort > audit/expected-server-stable.txt
          diff -u audit/expected-client-stable.txt audit/client-stable-assets.txt
          diff -u audit/expected-server-stable.txt audit/server-stable-assets.txt

          grep -Eq '^SCBL-Client-v0\.6\.3-win-x86\.zip$' audit/client-immutable-assets.txt
          grep -Eq '^SCBL-Client-v0\.6\.3-win-x86\.zip\.sha256$' audit/client-immutable-assets.txt
          grep -Fxq client-release-manifest.json audit/client-immutable-assets.txt
          grep -Eq '^SCBL-Server-Tool-v0\.6\.9-linux-x86_64\.tar\.gz$' audit/server-immutable-assets.txt
          grep -Eq '^SCBL-Server-Tool-v0\.6\.9-linux-x86_64\.tar\.gz\.sha256$' audit/server-immutable-assets.txt
          grep -Fxq server-tool-release-manifest.json audit/server-immutable-assets.txt

          gh release download client-stable-latest --repo "$GITHUB_REPOSITORY" -p client-release-manifest.json -D audit/client-stable
          gh release download server-tool-stable-latest --repo "$GITHUB_REPOSITORY" -p install-server.sh -p server-tool-release-manifest.json -D audit/server-stable

          jq -e '.schemaVersion == 3 and .version == "0.6.3" and .releaseTag == "client-v0.6.3" and .file == "SCBL-Client-v0.6.3-win-x86.zip"' \
            audit/client-stable/client-release-manifest.json
          jq -e '.schemaVersion == 3 and .version == "0.6.9" and .releaseTag == "server-tool-v0.6.9" and .file == "SCBL-Server-Tool-v0.6.9-linux-x86_64.tar.gz"' \
            audit/server-stable/server-tool-release-manifest.json
          bash -n audit/server-stable/install-server.sh

          {
            echo '# Optimized Release Audit'
            echo
            echo '## Client stable assets'
            sed 's/^/- /' audit/client-stable-assets.txt
            echo
            echo '## Client immutable assets'
            sed 's/^/- /' audit/client-immutable-assets.txt
            echo
            echo '## Server stable assets'
            sed 's/^/- /' audit/server-stable-assets.txt
            echo
            echo '## Server immutable assets'
            sed 's/^/- /' audit/server-immutable-assets.txt
          } > audit/report.md

      - uses: actions/upload-artifact@v4
        with:
          name: optimized-release-audit
          path: audit
          retention-days: 3
          if-no-files-found: error
