name: Publish pipe-safe SCBL bootstrap

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-pipe-safe-bootstrap.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and publish bootstrap asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/install-server.sh
          sha256sum scripts/install-server.sh
          gh release upload server-tool-stable-latest scripts/install-server.sh --clobber

      - name: Record publication status
        shell: bash
        run: |
          set -euo pipefail
          digest="$(sha256sum scripts/install-server.sh | awk '{print $1}')"
          cat > .github/SCBL_BOOTSTRAP_STATUS.md <<EOF
          # SCBL bootstrap publication status

          - Status: success
          - Release: server-tool-stable-latest
          - Asset: install-server.sh
          - SHA256: ${digest}
          - Source commit: ${GITHUB_SHA}
          - Published UTC: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          EOF
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .github/SCBL_BOOTSTRAP_STATUS.md
          git commit -m 'ci: record pipe-safe bootstrap publication'
          git push origin main
