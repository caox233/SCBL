name: Read failed Windows build log

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/read-failed-build-log.yml'

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-24.04
    steps:
      - name: Download failed job log
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '89409937628'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostic
          gh api -H 'Accept: application/vnd.github+json' "/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" > diagnostic/job-log.bin
          file diagnostic/job-log.bin | tee diagnostic/file-type.txt
          if unzip -t diagnostic/job-log.bin >/dev/null 2>&1; then
            unzip -p diagnostic/job-log.bin > diagnostic/job.log
          else
            cp diagnostic/job-log.bin diagnostic/job.log
          fi
          tail -160 diagnostic/job.log > diagnostic/job-tail.log
      - uses: actions/upload-artifact@v4
        with:
          name: failed-windows-build-log
          path: diagnostic
          retention-days: 1
          if-no-files-found: error
