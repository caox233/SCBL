name: Record SCBL v0.6.2 release status

on:
  workflow_run:
    workflows: ['Publish SCBL release']
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Record release result
        env:
          RESULT: ${{ github.event.workflow_run.conclusion }}
          STATUS: ${{ github.event.workflow_run.status }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github
          cat > .github/SCBL_RELEASE_STATUS.md <<EOF
          # SCBL v0.6.2 release status

          - Status: **${STATUS}**
          - Result: **${RESULT}**
          - Source commit: \`${SOURCE_SHA}\`
          - Workflow run: [${RUN_ID}](${RUN_URL})
          - Updated UTC: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/SCBL_RELEASE_STATUS.md
          git commit -m 'ci: record v0.6.2 release status [skip ci]' || exit 0
          git push origin HEAD:main
