name: Publish SCBL release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.6.0 (must match VERSION)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(tr -d '\r\n ' < VERSION)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            requested="${GITHUB_REF_NAME#v}"
          else
            requested="${{ inputs.version }}"
            requested="${requested#v}"
          fi
          [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $requested" >&2; exit 1; }
          [[ "$requested" == "$source_version" ]] || { echo "Requested $requested != VERSION $source_version" >&2; exit 1; }
          echo "version=$requested" >> "$GITHUB_OUTPUT"
          echo "tag=v$requested" >> "$GITHUB_OUTPUT"

  client:
    needs: metadata
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
      - name: Build and package client
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          .\client\build_all_windows.ps1
          .\client\create_client_full_package.ps1 -Version '${{ needs.metadata.outputs.version }}' -OutputDir "$env:GITHUB_WORKSPACE\dist"
          $zips = @(Get-ChildItem .\dist\SCBL-Client-v*-win-x86.zip)
          if ($zips.Count -ne 1) {
            throw "Expected exactly one client ZIP, found $($zips.Count)."
          }
          $zip = $zips[0]
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Set-Content -Encoding ascii "$($zip.FullName).sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: release-client
          path: dist/*
          if-no-files-found: error

  server:
    needs: metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate and package server
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.metadata.outputs.version }}'
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py

          mkdir -p dist "stage/SCBL-Server-v${version}-linux-x86_64/THIRD_PARTY_LICENSES"
          cp server/install_public_server.sh \
             server/scbl_control_plane.py \
             server/check_scbl_binary_release.sh \
             server/5th-echelon_branch.txt \
             "stage/SCBL-Server-v${version}-linux-x86_64/"
          cp THIRD_PARTY_LICENSES/EasyTier-LGPL-3.0.txt \
             "stage/SCBL-Server-v${version}-linux-x86_64/THIRD_PARTY_LICENSES/"
          cp VERSION README.md CHANGELOG.md THIRD_PARTY_NOTICES.md \
             "stage/SCBL-Server-v${version}-linux-x86_64/"
          chmod 0755 "stage/SCBL-Server-v${version}-linux-x86_64/install_public_server.sh" \
                     "stage/SCBL-Server-v${version}-linux-x86_64/check_scbl_binary_release.sh"

          tar -C stage -czf "dist/SCBL-Server-v${version}-linux-x86_64.tar.gz" \
            "SCBL-Server-v${version}-linux-x86_64"
          cp "dist/SCBL-Server-v${version}-linux-x86_64.tar.gz" \
             dist/SCBL-Server-latest-linux-x86_64.tar.gz
          cp scripts/install-server.sh dist/install-server.sh

          for file in dist/*.tar.gz; do
            hash="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$file")" > "${file}.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: release-server
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [metadata, client, server]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create manifest and checksums
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.metadata.outputs.version }}'
          client="SCBL-Client-v${version}-win-x86.zip"
          server="SCBL-Server-v${version}-linux-x86_64.tar.gz"
          client_sha="$(sha256sum "dist/$client" | awk '{print $1}')"
          server_sha="$(sha256sum "dist/$server" | awk '{print $1}')"
          cat > dist/release-manifest.json <<JSON
          {
            "schemaVersion": 1,
            "product": "SCBL",
            "version": "${version}",
            "channel": "stable",
            "client": {
              "platform": "windows",
              "file": "${client}",
              "sha256": "${client_sha}"
            },
            "server": {
              "platform": "linux-x86_64",
              "file": "${server}",
              "sha256": "${server_sha}"
            },
            "dedicatedServer": {
              "repository": "caox233/5th-echelon",
              "releaseTag": "scbl-public-stable-latest",
              "asset": "dedicated_server-linux-x86_64",
              "bundled": false
            }
          }
          JSON
          (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\n' | sort) > SHA256SUMS.txt)
          ls -lah dist
      - name: Refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view '${{ needs.metadata.outputs.tag }}' >/dev/null 2>&1; then
            echo "Release ${{ needs.metadata.outputs.tag }} already exists. Publish a new version instead of overwriting it." >&2
            exit 1
          fi
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create '${{ needs.metadata.outputs.tag }}' dist/* \
            --title 'SCBL v${{ needs.metadata.outputs.version }}' \
            --generate-notes
