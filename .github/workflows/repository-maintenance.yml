name: Repository maintenance

on:
  pull_request:
    types: [closed]
  push:
    branches: [main]
    paths:
      - scripts/maintenance/repository-cleanup.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-merged-branch:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-24.04
    steps:
      - name: Delete merged source branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_BRANCH}" || true

  one-time-cleanup:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Keep only main and current release generations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          echo 'Deleting all non-main branches...'
          while read -r branch; do
            [[ "$branch" == main ]] && continue
            echo "Deleting branch: $branch"
            git push origin --delete "$branch" || true
          done < <(git ls-remote --heads origin | sed 's#.*refs/heads/##' | sort)

          bash scripts/maintenance/prune_component_releases.sh client 2
          bash scripts/maintenance/prune_component_releases.sh server-tool 2

          mapfile -t keep_tags < <(
            {
              printf '%s\n' client-stable-latest server-tool-stable-latest
              gh release list --limit 200 --json tagName --jq '.[].tagName' |
                grep -E '^(client|server-tool)-v[0-9]+\.[0-9]+\.[0-9]+$' || true
            } | sort -u
          )

          is_kept() {
            local candidate="$1"
            printf '%s\n' "${keep_tags[@]}" | grep -Fxq "$candidate"
          }

          while read -r tag; do
            is_kept "$tag" && continue
            echo "Deleting obsolete tag: $tag"
            git push origin ":refs/tags/$tag" || true
          done < <(git ls-remote --tags --refs origin | sed 's#.*refs/tags/##' | sort)

          branches="$(git ls-remote --heads origin | sed 's#.*refs/heads/##' | sort)"
          tags="$(git ls-remote --tags --refs origin | sed 's#.*refs/tags/##' | sort)"
          releases="$(gh release list --limit 200 --json tagName,name,publishedAt --jq '.[] | [.tagName,.name,.publishedAt] | @tsv')"

          echo
          echo 'Final branches:'
          printf '%s\n' "$branches"
          echo
          echo 'Final tags:'
          printf '%s\n' "$tags"
          echo
          echo 'Final releases:'
          printf '%s\n' "$releases"

          report=docs/REPOSITORY_MAINTENANCE_STATUS.md
          {
            echo '# SCBL Repository Maintenance Status'
            echo
            echo "- Completed UTC: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`"
            echo '- Retention: only `main`, two immutable releases per component, and rolling stable tags.'
            echo
            echo '## Branches'
            echo
            echo '```text'
            printf '%s\n' "$branches"
            echo '```'
            echo
            echo '## Tags'
            echo
            echo '```text'
            printf '%s\n' "$tags"
            echo '```'
            echo
            echo '## Releases'
            echo
            echo '```text'
            printf '%s\n' "$releases"
            echo '```'
          } > "$report"

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add "$report"
          git commit -m 'docs: record repository maintenance result [skip ci]' || exit 0
          git push origin HEAD:main
