name: Retry SCBL server tool v0.6.4 finalizer

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/SERVER_TOOL_V064_RETRY'

permissions:
  contents: write

jobs:
  retry:
    if: github.head_ref == 'server-tool-v064-retry'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: server-tool-v064-retry
          fetch-depth: 0

      - name: Extract, run and validate finalizer
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(tr -d '\r\n ' < VERSION_SERVER_TOOL)"
          if [[ "$current_version" != "0.6.4" ]]; then
            python3 - <<'PY'
            from pathlib import Path

            workflow = Path('.github/workflows/finalize-server-tool-v0.6.4.yml').read_text(encoding='utf-8')
            lines = workflow.splitlines()
            start = next(i for i, line in enumerate(lines) if line.strip() == "python3 - <<'PY'")
            end = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY')
            source_lines = []
            for line in lines[start + 1:end]:
                source_lines.append(line[10:] if line.startswith('          ') else line)
            Path('/tmp/finalize-server-tool-v064.py').write_text('\n'.join(source_lines) + '\n', encoding='utf-8')
            PY

            set +e
            python3 /tmp/finalize-server-tool-v064.py > /tmp/finalizer.log 2>&1
            rc=$?
            set -e
            if [[ "$rc" != "0" ]]; then
              cat /tmp/finalizer.log
              exit "$rc"
            fi
          fi

          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in (Path('server/install_public_server.sh'), Path('scripts/install-server.sh')):
              text = path.read_text(encoding='utf-8')
              blocks = re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S)
              if not blocks:
                  raise SystemExit(f'{path}: no embedded Python heredocs found')
              for marker, source in blocks:
                  compile(source, f'{path}:{marker}', 'exec')
              print(f'{path}: validated {len(blocks)} embedded Python heredocs')
          PY
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py

          if ! git diff --quiet; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add VERSION_SERVER_TOOL COMPONENT_VERSIONS.json CHANGELOG.md \
              scripts/install-server.sh server/install_public_server.sh server/scbl_control_plane.py \
              docs/releases/SERVER_TOOL_v0.6.4.md
            git commit -m 'SCBL Server Tool v0.6.4: rollback and upgrade hardening'
            git push origin HEAD:server-tool-v064-retry
          fi
