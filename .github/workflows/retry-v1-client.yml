name: Retry v1 client patch

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/retry-v1-client.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Run corrected client patch
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-v1-client.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply client changes\n        shell: bash\n        run: |\n'
          start = text.index(marker) + len(marker)
          lines = text[start:].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          script = script.replace(
              'dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj --runtime win-x86',
              'dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj --runtime win-x86 -p:EnableWindowsTargeting=true')
          script = script.replace(
              'dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -r win-x86 --no-restore --nologo',
              'dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -r win-x86 --no-restore --nologo -p:EnableWindowsTargeting=true')
          Path('/tmp/apply-v1-client.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-v1-client.sh
