name: Retry v1 formal release patch

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/retry-v1-release.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Run formal release patch without expression preprocessing
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-v1-release.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply formal v1 release changes\n        shell: bash\n        run: |\n'
          start = text.index(marker) + len(marker)
          lines = text[start:].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-v1-release.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-v1-release.sh
