name: Retry v1 server patch with literal replacements

on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/retry2-v1-server.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-v1.0.0
          fetch-depth: 0
      - name: Run corrected server patch
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-v1-server.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply server changes\n        shell: bash\n        run: |\n'
          start = text.index(marker) + len(marker)
          lines = text[start:].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          script = script.replace('if manager.count(anchor) != 1:', 'if manager.count(anchor) < 1:', 1)
          script = script.replace(
              "updated, count = re.subn(pattern, dedent(replacement).strip() + '\\n\\n', text, count=1, flags=re.S | re.M)",
              "updated, count = re.subn(pattern, lambda _: dedent(replacement).strip() + '\\n\\n', text, count=1, flags=re.S | re.M)",
              1)
          Path('/tmp/apply-v1-server.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-v1-server.sh
