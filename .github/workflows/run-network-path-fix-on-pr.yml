name: Run network path fix on PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fix-p2p-relay-and-host-latency'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-p2p-relay-and-host-latency
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-go@v5
        with:
          go-version: 1.23.2
          cache: true
          cache-dependency-path: client/scbl-process-router/go.sum

      - name: Apply exact source patch
        run: python3 scripts/maintenance/apply_network_path_fix.py

      - name: Validate server and policy
        shell: bash
        run: |
          set -euo pipefail
          bash -n server/install_public_server.sh
          python3 -m py_compile server/test_network_topology.py server/test_ddns_go_native.py
          python3 server/test_network_topology.py
          python3 server/test_ddns_go_native.py

      - name: Build Launcher and Updater
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -p:EnableWindowsTargeting=true
          dotnet build client/ScblPublicLauncher/SplinterCellCNLauncher.csproj -c Release -p:EnableWindowsTargeting=true --no-restore
          dotnet restore client/SCBL.Updater/SCBL.Updater.csproj -p:EnableWindowsTargeting=true
          dotnet build client/SCBL.Updater/SCBL.Updater.csproj -c Release -p:EnableWindowsTargeting=true --no-restore

      - name: Validate Route Guard
        working-directory: client/scbl-process-router
        shell: bash
        run: |
          set -euo pipefail
          go mod download
          test -z "$(gofmt -l .)"
          GOOS=windows GOARCH=amd64 go vet ./...
          GOOS=windows GOARCH=amd64 go test ./...
          GOOS=windows GOARCH=amd64 go build -mod=readonly -trimpath -o /tmp/scbl-process-router.exe .
          test -s /tmp/scbl-process-router.exe

      - name: Commit verified source changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: agent/fix-p2p-relay-and-host-latency
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          paths = [
              'VERSION', 'VERSION_CLIENT', 'VERSION_SERVER_TOOL', 'COMPONENT_VERSIONS.json',
              'README.md', 'CHANGELOG.md',
              'client/ScblPublicLauncher/Models/LauncherSettings.cs',
              'client/ScblPublicLauncher/Services/LauncherSettingsService.cs',
              'client/ScblPublicLauncher/Services/PublicTunnelService.cs',
              'client/ScblPublicLauncher/MainWindow.xaml.cs',
              'client/scbl-process-router/main.go',
              'server/install_public_server.sh',
              'server/test_ddns_go_native.py',
              'server/test_network_topology.py',
              'docs/releases/CLIENT_v1.0.1.md',
              'docs/releases/SERVER_TOOL_v1.0.1.md',
          ]
          token = os.environ['GH_TOKEN']
          repository = os.environ['REPOSITORY']
          branch = os.environ['TARGET_BRANCH']
          api = f'https://api.github.com/repos/{repository}'

          def request(method, url, payload):
              data = json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.load(response)

          parent = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          base_tree = subprocess.check_output(['git', 'rev-parse', 'HEAD^{tree}'], text=True).strip()
          entries = []
          for path in paths:
              content = open(path, 'rb').read()
              blob = request('POST', api + '/git/blobs', {
                  'content': base64.b64encode(content).decode('ascii'),
                  'encoding': 'base64',
              })
              try:
                  mode = subprocess.check_output(['git', 'ls-files', '-s', '--', path], text=True).split()[0]
              except Exception:
                  mode = '100644'
              entries.append({'path': path, 'mode': mode or '100644', 'type': 'blob', 'sha': blob['sha']})

          tree = request('POST', api + '/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = request('POST', api + '/git/commits', {
              'message': 'Release v1.0.1 P2P relay stability fix',
              'tree': tree['sha'],
              'parents': [parent],
          })
          request('PATCH', api + f'/git/refs/heads/{branch}', {'sha': commit['sha'], 'force': False})
          print('Created commit:', commit['sha'])
          PY
