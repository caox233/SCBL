name: Run SCBL v0.6.3 migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/v0.6.2-stability'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.3-component-release
          fetch-depth: 1
          show-progress: false
      - name: Prepare reviewed migration plan
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-v0.6.3-component-release.yml').read_text(encoding='utf-8')
          marker = '        run: |\n'
          block = source.split(marker, 1)[1]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          script = '\n'.join(lines) + '\n'
          script = script.replace("helper = r'''", "helper = '''", 1)
          script = script.replace("refresh_replacement = r'''", "refresh_replacement = '''", 1)
          Path('/tmp/apply-v0.6.3.sh').write_text(script, encoding='utf-8')
          PY
          bash -n /tmp/apply-v0.6.3.sh
      - id: migration
        name: Execute migration
        continue-on-error: true
        shell: bash
        run: bash /tmp/apply-v0.6.3.sh > migration.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v0.6.3-migration-log
          path: migration.log
          if-no-files-found: error
      - name: Report migration result
        if: always()
        shell: bash
        run: |
          tail -n 120 migration.log || true
          test '${{ steps.migration.outcome }}' = 'success'
