name: Run SCBL v0.6.2 integration patch v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Run corrected patch body
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/scbl-apply-v062.yml > /tmp/apply.yml
          python3 <<'PY'
          from pathlib import Path
          lines = Path('/tmp/apply.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          body=[]
          for line in lines[start:]:
              if line and not line.startswith('          '): break
              body.append(line[10:] if line.startswith('          ') else '')
          script='\n'.join(body)+'\n'
          old="""if 'game process ended normally' not in text:
              if old not in text:
                  raise SystemExit('ProcessRouter exit classification anchor not found')
              text = text.replace(old, new, 1)"""
          new_code="""if 'game process ended normally' not in text:
              start_pos = text.find('            if (intentional)')
              marker = '            Interlocked.Increment(ref _unexpectedExitCount);'
              end_pos = text.find(marker, start_pos)
              if start_pos < 0 or end_pos < 0:
                  raise SystemExit('ProcessRouter exit classification anchor not found')
              end_pos += len(marker)
              text = text[:start_pos] + new + text[end_pos:]"""
          if old not in script:
              raise SystemExit('wrapper could not locate ProcessRouter patch block')
          Path('/tmp/apply-v2.sh').write_text(script.replace(old,new_code,1), encoding='utf-8')
          PY
          bash /tmp/apply-v2.sh
