name: Run SCBL v0.6.2 integration patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Run patch body from main workflow
        shell: bash
        run: |
          git show origin/main:.github/workflows/scbl-apply-v062.yml > /tmp/apply.yml
          python3 <<'PY'
          from pathlib import Path
          lines = Path('/tmp/apply.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          body = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              body.append(line[10:] if line.startswith('          ') else '')
          Path('/tmp/apply.sh').write_text('\n'.join(body) + '\n', encoding='utf-8')
          PY
          bash /tmp/apply.sh
