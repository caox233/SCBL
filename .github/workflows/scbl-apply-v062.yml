name: Apply SCBL v0.6.2 source changes

on:
  push:
    branches: [main]
    paths: ['.github/workflows/scbl-apply-v062.yml']

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Apply remaining v0.6.2 changes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8-sig')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'anchor not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Windows PowerShell 5.1 compatibility.
          p = Path('client/build_all_windows.ps1')
          text = p.read_text(encoding='utf-8-sig')
          text = text.replace('$FifthBranch = ($env:SCBL_5TH_BRANCH ?? "").Trim()', '$FifthBranch = if ($null -eq $env:SCBL_5TH_BRANCH) { "" } else { $env:SCBL_5TH_BRANCH.Trim() }')
          text = text.replace('$GitHubToken = ($env:SCBL_GITHUB_TOKEN ?? "").Trim()', '$GitHubToken = if ($null -eq $env:SCBL_GITHUB_TOKEN) { "" } else { $env:SCBL_GITHUB_TOKEN.Trim() }')
          p.write_text(text, encoding='utf-8')

          # EasyTier remains a distributed mesh. P2P is enabled but not mandatory,
          # so nodes that cannot punch directly can still join through TCP/WSS and relay paths.
          replace_once(
              'client/ScblPublicLauncher/Services/PublicTunnelService.cs',
              'need_p2p = {effectiveP2P.ToString().ToLowerInvariant()}',
              'need_p2p = false'
          )

          # A clean Route Guard exit after the game process disappears is normal.
          p = Path('client/ScblPublicLauncher/Services/ProcessRouterService.cs')
          text = p.read_text(encoding='utf-8-sig')
          old = '''            if (intentional)
              {
                  _lastExitReason = "intentional";
                  WriteGuardHealthSnapshot("stopped");
                  return;
              }

              Interlocked.Increment(ref _unexpectedExitCount);'''
          new = '''            if (intentional)
              {
                  _lastExitReason = "intentional";
                  WriteGuardHealthSnapshot("stopped");
                  return;
              }

              bool normalGameEnd;
              lock (_sessionSync)
              {
                  normalGameEnd = exitCode == 0
                      && !_allowEmptyGamePids
                      && !_gamePids.Any(IsProcessAlive);
              }
              if (normalGameEnd)
              {
                  _lastExitReason = "game process ended normally";
                  LogService.Info($"Process router exited normally after the launcher-owned game process ended. pid={pid}, exit={exitCode}");
                  WriteGuardHealthSnapshot("game-ended");
                  return;
              }

              Interlocked.Increment(ref _unexpectedExitCount);'''
          if 'game process ended normally' not in text:
              if old not in text:
                  raise SystemExit('ProcessRouter exit classification anchor not found')
              text = text.replace(old, new, 1)
          p.write_text(text, encoding='utf-8')

          # Route Guard: never enumerate Windows owner tables on the packet hot path.
          p = Path('client/scbl-process-router/main.go')
          text = p.read_text(encoding='utf-8')
          text = text.replace('routerVersion         = "0.6.1"', 'routerVersion         = "0.6.2"')
          text = text.replace('ticker := time.NewTicker(500 * time.Millisecond)', 'ticker := time.NewTicker(1 * time.Second)', 1)
          old_struct = '''type OwnerResolver struct {
              session         *launcherSessionGuard
              mu              sync.RWMutex
              refreshMu       sync.Mutex
              lastFastRefresh time.Time
              targetPIDs      map[uint32]bool
              tcpOwners       map[ownerKey]uint32
              udpOwners       map[udpKey][]uint32
              stop            chan struct{}
          }

          func newOwnerResolver(session *launcherSessionGuard) *OwnerResolver {
              return &OwnerResolver{session: session, stop: make(chan struct{})}
          }'''
          new_struct = '''type OwnerResolver struct {
              session        *launcherSessionGuard
              mu             sync.RWMutex
              refreshMu      sync.Mutex
              targetPIDs     map[uint32]bool
              tcpOwners      map[ownerKey]uint32
              udpOwners      map[udpKey][]uint32
              refreshRequest chan struct{}
              stop           chan struct{}
          }

          func newOwnerResolver(session *launcherSessionGuard) *OwnerResolver {
              return &OwnerResolver{
                  session:        session,
                  targetPIDs:     map[uint32]bool{},
                  tcpOwners:      map[ownerKey]uint32{},
                  udpOwners:      map[udpKey][]uint32{},
                  refreshRequest: make(chan struct{}, 1),
                  stop:           make(chan struct{}),
              }
          }'''
          if 'refreshRequest chan struct{}' not in text:
              if old_struct not in text:
                  raise SystemExit('OwnerResolver struct anchor not found')
              text = text.replace(old_struct, new_struct, 1)
          old_start = '''func (r *OwnerResolver) Start() {
              r.refresh()
              go func() {
                  t := time.NewTicker(500 * time.Millisecond)
                  defer t.Stop()
                  for {
                      select {
                      case <-t.C:
                          r.refresh()
                      case <-r.stop:
                          return
                      }
                  }
              }()
          }'''
          new_start = '''func (r *OwnerResolver) Start() {
              r.refresh()
              go func() {
                  t := time.NewTicker(500 * time.Millisecond)
                  defer t.Stop()
                  for {
                      select {
                      case <-t.C:
                          r.refresh()
                      case <-r.refreshRequest:
                          r.refresh()
                      case <-r.stop:
                          return
                      }
                  }
              }()
          }'''
          if 'case <-r.refreshRequest:' not in text:
              if old_start not in text:
                  raise SystemExit('OwnerResolver Start anchor not found')
              text = text.replace(old_start, new_start, 1)
          old_resolve = '''func (r *OwnerResolver) ResolveOutbound(m *PacketMeta) (uint32, bool) {
              if pid, ok := r.Owner(m); ok {
                  return pid, true
              }
              if r.HasTargetProcesses() {
                  r.fastRefresh()
                  return r.Owner(m)
              }
              return 0, false
          }

          func (r *OwnerResolver) ResolveInbound(m *PacketMeta) (uint32, bool) {
              if pid, ok := r.OwnerInbound(m); ok {
                  return pid, true
              }
              if r.HasTargetProcesses() {
                  r.fastRefresh()
                  return r.OwnerInbound(m)
              }
              return 0, false
          }

          func (r *OwnerResolver) fastRefresh() {
              r.refreshMu.Lock()
              defer r.refreshMu.Unlock()
              if !r.lastFastRefresh.IsZero() && time.Since(r.lastFastRefresh) < 120*time.Millisecond {
                  return
              }
              r.lastFastRefresh = time.Now()
              r.refreshOwnersUnlocked()
          }'''
          new_resolve = '''func (r *OwnerResolver) ResolveOutbound(m *PacketMeta) (uint32, bool) {
              if pid, ok := r.Owner(m); ok {
                  return pid, true
              }
              if r.HasTargetProcesses() {
                  r.requestRefresh()
              }
              return 0, false
          }

          func (r *OwnerResolver) ResolveInbound(m *PacketMeta) (uint32, bool) {
              if pid, ok := r.OwnerInbound(m); ok {
                  return pid, true
              }
              if r.HasTargetProcesses() {
                  r.requestRefresh()
              }
              return 0, false
          }

          func (r *OwnerResolver) requestRefresh() {
              select {
              case r.refreshRequest <- struct{}{}:
              default:
              }
          }'''
          if 'func (r *OwnerResolver) requestRefresh()' not in text:
              if old_resolve not in text:
                  raise SystemExit('OwnerResolver resolve anchor not found')
              text = text.replace(old_resolve, new_resolve, 1)
          p.write_text(text, encoding='utf-8')

          # Server installer version, terminal hardening and selectable 5th source.
          p = Path('server/install_public_server.sh')
          text = p.read_text(encoding='utf-8')
          text = text.replace('SERVER_TOOL_VERSION="0.6.1"', 'SERVER_TOOL_VERSION="0.6.2"')
          defaults_anchor = 'DEFAULT_DEDICATED_RELEASE_TAG="scbl-public-stable-latest"\n'
          defaults_add = '''DEFAULT_DEDICATED_RELEASE_TAG="scbl-public-stable-latest"
          DEFAULT_5TH_REPOSITORY="caox233/5th-echelon"
          DEFAULT_5TH_BRANCH=""
          DEFAULT_5TH_SOURCE_MODE="release"
          '''
          if 'DEFAULT_5TH_REPOSITORY=' not in text:
              text = text.replace(defaults_anchor, defaults_add, 1)
          root_anchor = '''if [[ $EUID -ne 0 ]]; then
              echo "请用 root 运行：sudo bash install_public_server.sh"
              exit 1
          fi
          '''
          terminal = '''if [[ $EUID -ne 0 ]]; then
              echo "请用 root 运行：sudo bash install_public_server.sh"
              exit 1
          fi

          SCBL_ORIGINAL_STTY=""
          setup_terminal() {
              [[ -t 0 ]] || return 0
              SCBL_ORIGINAL_STTY="$(stty -g 2>/dev/null || true)"
              stty -ixon 2>/dev/null || true
          }
          restore_terminal() {
              [[ -t 0 && -n "${SCBL_ORIGINAL_STTY:-}" ]] || return 0
              stty "$SCBL_ORIGINAL_STTY" 2>/dev/null || true
          }
          trap restore_terminal EXIT
          setup_terminal
          '''
          if 'setup_terminal()' not in text:
              if root_anchor not in text:
                  raise SystemExit('terminal anchor not found')
              text = text.replace(root_anchor, terminal, 1)
          set_anchor = '''  DEDICATED_URL="${DEDICATED_URL:-$DEFAULT_DEDICATED_URL}"
              DEDICATED_SHA256_URL="${DEDICATED_SHA256_URL:-$DEFAULT_DEDICATED_SHA256_URL}"
          '''
          set_new = '''  SCBL_5TH_REPOSITORY="${SCBL_5TH_REPOSITORY:-$DEFAULT_5TH_REPOSITORY}"
              SCBL_5TH_RELEASE_TAG="${SCBL_5TH_RELEASE_TAG:-$DEFAULT_DEDICATED_RELEASE_TAG}"
              SCBL_5TH_BRANCH="${SCBL_5TH_BRANCH:-$DEFAULT_5TH_BRANCH}"
              SCBL_5TH_SOURCE_MODE="${SCBL_5TH_SOURCE_MODE:-$DEFAULT_5TH_SOURCE_MODE}"
              DEDICATED_URL="https://github.com/${SCBL_5TH_REPOSITORY}/releases/download/${SCBL_5TH_RELEASE_TAG}/dedicated_server-linux-x86_64"
              DEDICATED_SHA256_URL="https://github.com/${SCBL_5TH_REPOSITORY}/releases/download/${SCBL_5TH_RELEASE_TAG}/dedicated_server-linux-x86_64.sha256"
          '''
          if 'SCBL_5TH_REPOSITORY="${SCBL_5TH_REPOSITORY' not in text:
              if set_anchor not in text:
                  raise SystemExit('5th defaults anchor not found')
              text = text.replace(set_anchor, set_new, 1)
          env_anchor = '''DEDICATED_URL=$(quote "$DEDICATED_URL")
          DEDICATED_SHA256_URL=$(quote "$DEDICATED_SHA256_URL")
          '''
          env_new = '''SCBL_5TH_REPOSITORY=$(quote "$SCBL_5TH_REPOSITORY")
          SCBL_5TH_RELEASE_TAG=$(quote "$SCBL_5TH_RELEASE_TAG")
          SCBL_5TH_BRANCH=$(quote "$SCBL_5TH_BRANCH")
          SCBL_5TH_SOURCE_MODE=$(quote "$SCBL_5TH_SOURCE_MODE")
          DEDICATED_URL=$(quote "$DEDICATED_URL")
          DEDICATED_SHA256_URL=$(quote "$DEDICATED_SHA256_URL")
          '''
          if 'SCBL_5TH_SOURCE_MODE=$(quote' not in text:
              if env_anchor not in text:
                  raise SystemExit('write_env 5th anchor not found')
              text = text.replace(env_anchor, env_new, 1)

          old_fetch = re.search(r'fetch_scbl_dedicated_expected_sha256\(\) \{.*?^\}\n\nrecord_scbl_dedicated_release', text, re.S | re.M)
          if not old_fetch:
              raise SystemExit('dedicated fetch function anchor not found')
          new_fetch = r'''github_asset_headers() {
              if [[ -n "${SCBL_5TH_GITHUB_TOKEN:-}" ]]; then
                  printf '%s\n' "Authorization: Bearer ${SCBL_5TH_GITHUB_TOKEN}"
              fi
          }

          download_5th_asset() {
              local asset="$1" destination="$2" auth_header="" api archive_url zip tmp found
              mkdir -p "$(dirname "$destination")"
              rm -f "$destination"
              if [[ "${SCBL_5TH_SOURCE_MODE:-release}" == "branch" ]]; then
                  [[ -n "${SCBL_5TH_BRANCH:-}" ]] || { echo "5th 分支为空。" >&2; return 1; }
                  [[ -n "${SCBL_5TH_GITHUB_TOKEN:-}" ]] || {
                      echo "下载分支构建产物需要 GitHub Personal Access Token；GitHub 不接受账号密码下载 Actions Artifact。" >&2
                      return 1
                  }
                  api="https://api.github.com/repos/${SCBL_5TH_REPOSITORY}/actions/artifacts?name=scbl-dedicated-linux&per_page=100"
                  archive_url="$(curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 \
                      -H "Accept: application/vnd.github+json" \
                      -H "Authorization: Bearer ${SCBL_5TH_GITHUB_TOKEN}" \
                      -H "X-GitHub-Api-Version: 2022-11-28" "$api" | \
                      python3 -c 'import json,sys; branch=sys.argv[1]; data=json.load(sys.stdin); items=[x for x in data.get("artifacts",[]) if not x.get("expired") and (x.get("workflow_run") or {}).get("head_branch")==branch]; items.sort(key=lambda x:x.get("created_at", ""), reverse=True); print(items[0]["archive_download_url"] if items else "")' "$SCBL_5TH_BRANCH")"
                  [[ -n "$archive_url" ]] || { echo "未找到分支 ${SCBL_5TH_BRANCH} 的 scbl-dedicated-linux Artifact。" >&2; return 1; }
                  zip="$(mktemp)"
                  tmp="$(mktemp -d)"
                  curl -fL --connect-timeout 10 --max-time 240 --retry 3 \
                      -H "Accept: application/vnd.github+json" \
                      -H "Authorization: Bearer ${SCBL_5TH_GITHUB_TOKEN}" \
                      -H "X-GitHub-Api-Version: 2022-11-28" "$archive_url" -o "$zip"
                  unzip -q "$zip" -d "$tmp"
                  found="$(find "$tmp" -type f -name "$asset" | head -n 1 || true)"
                  [[ -n "$found" ]] || { rm -rf "$tmp" "$zip"; echo "Artifact 中缺少 $asset。" >&2; return 1; }
                  cp -f "$found" "$destination"
                  rm -rf "$tmp" "$zip"
                  return 0
              fi
              local url="https://github.com/${SCBL_5TH_REPOSITORY}/releases/download/${SCBL_5TH_RELEASE_TAG}/${asset}"
              local args=(-fL --connect-timeout 10 --max-time 240 --retry 3 --retry-all-errors)
              if [[ -n "${SCBL_5TH_GITHUB_TOKEN:-}" ]]; then
                  args+=(-H "Authorization: Bearer ${SCBL_5TH_GITHUB_TOKEN}")
              fi
              curl "${args[@]}" "$url" -o "$destination"
          }

          fetch_scbl_dedicated_expected_sha256() {
              local checksum_tmp expected
              checksum_tmp="$SCBL_ROOT/cache/dedicated_server-linux-x86_64.sha256.check.$$"
              mkdir -p "$SCBL_ROOT/cache"
              rm -f "$checksum_tmp"
              download_5th_asset dedicated_server-linux-x86_64.sha256 "$checksum_tmp" || { rm -f "$checksum_tmp"; return 1; }
              expected="$(awk 'NF {print tolower($1); exit}' "$checksum_tmp")"
              rm -f "$checksum_tmp"
              [[ "$expected" =~ ^[0-9a-f]{64}$ ]] || return 1
              printf '%s\n' "$expected"
          }

          record_scbl_dedicated_release'''
          text = text[:old_fetch.start()] + new_fetch + text[old_fetch.end():]
          text = text.replace('source=scbl-public-stable\nrelease_tag=$DEFAULT_DEDICATED_RELEASE_TAG\nsha256=$sha256\nsource_url=$DEDICATED_URL', 'source_repository=$SCBL_5TH_REPOSITORY\nsource_mode=$SCBL_5TH_SOURCE_MODE\nrelease_tag=$SCBL_5TH_RELEASE_TAG\nbranch=$SCBL_5TH_BRANCH\nsha256=$sha256\nsource_url=$DEDICATED_URL')
          old_download = '''  echo "下载 SCBL 专用 dedicated_server：$DEDICATED_URL"
              if ! curl -fL --connect-timeout 10 --max-time 240 --retry 3 --retry-all-errors --progress-bar \\
              "$DEDICATED_URL" -o "$tmp"; then
              rm -f "$tmp"
              echo "专用 dedicated_server 下载失败。"
              return 1
              fi'''
          new_download = '''  echo "下载 SCBL 专用 dedicated_server：仓库=$SCBL_5TH_REPOSITORY，模式=$SCBL_5TH_SOURCE_MODE，分支=${SCBL_5TH_BRANCH:-无}，标签=$SCBL_5TH_RELEASE_TAG"
              if ! download_5th_asset dedicated_server-linux-x86_64 "$tmp"; then
              rm -f "$tmp"
              echo "专用 dedicated_server 下载失败。"
              return 1
              fi'''
          if 'download_5th_asset dedicated_server-linux-x86_64 "$tmp"' not in text:
              if old_download not in text:
                  raise SystemExit('dedicated download call anchor not found')
              text = text.replace(old_download, new_download, 1)
          prompt_anchor = '  prompt_value SCBL_MIN_CLIENT_VERSION "控制平面允许的最低客户端版本" "$SCBL_MIN_CLIENT_VERSION"\n'
          prompt_new = '''  prompt_value SCBL_MIN_CLIENT_VERSION "控制平面允许的最低客户端版本" "$SCBL_MIN_CLIENT_VERSION"
              prompt_value SCBL_5TH_REPOSITORY "5th Echelon 二进制仓库（owner/repo）" "$SCBL_5TH_REPOSITORY"
              prompt_value SCBL_5TH_BRANCH "5th 构建分支，留空则下载 Release" "$SCBL_5TH_BRANCH"
              if [[ -n "$SCBL_5TH_BRANCH" ]]; then
              SCBL_5TH_SOURCE_MODE="branch"
              if is_interactive; then
                  read -r -s -p "GitHub Personal Access Token（只用于本次下载，不写入磁盘）: " SCBL_5TH_GITHUB_TOKEN || true
                  echo
              fi
              [[ -n "${SCBL_5TH_GITHUB_TOKEN:-}" ]] || echo "警告：分支 Artifact 下载需要 PAT，GitHub 账号密码不能用于脚本下载。"
              else
              SCBL_5TH_SOURCE_MODE="release"
              prompt_value SCBL_5TH_RELEASE_TAG "5th Release 标签" "$SCBL_5TH_RELEASE_TAG"
              fi
              DEDICATED_URL="https://github.com/${SCBL_5TH_REPOSITORY}/releases/download/${SCBL_5TH_RELEASE_TAG}/dedicated_server-linux-x86_64"
              DEDICATED_SHA256_URL="https://github.com/${SCBL_5TH_REPOSITORY}/releases/download/${SCBL_5TH_RELEASE_TAG}/dedicated_server-linux-x86_64.sha256"
          '''
          if 'GitHub Personal Access Token（只用于本次下载' not in text:
              if prompt_anchor not in text:
                  raise SystemExit('5th source prompt anchor not found')
              text = text.replace(prompt_anchor, prompt_new, 1)
          p.write_text(text, encoding='utf-8')

          # README ownership and version.
          p = Path('README.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace('**v0.6.1**', '**v0.6.2**').replace('SCBL-Client-v0.6.1-win-x86.zip', 'SCBL-Client-v0.6.2-win-x86.zip')
          text = text.replace('当前 Hooks 源码快照位于 [`client/hooks-source/`](client/hooks-source/)，嵌入 DLL 与存档的固定校验值位于 [`SCBL_EMBEDDED_SHA256.txt`](client/ScblPublicLauncher/EmbeddedFiles/SCBL_EMBEDDED_SHA256.txt)。', 'Hooks 与 dedicated_server 源码及二进制统一由 `caox233/5th-echelon` 构建；SCBL 构建时下载并校验 5th 发布的 Hooks DLL。嵌入文件校验清单位于 [`SCBL_EMBEDDED_SHA256.txt`](client/ScblPublicLauncher/EmbeddedFiles/SCBL_EMBEDDED_SHA256.txt)。')
          p.write_text(text, encoding='utf-8')
          PY

          git rm -r --ignore-unmatch client/hooks-source
          git rm -f --ignore-unmatch client/ScblPublicLauncher/EmbeddedFiles/uplay_r1_loader.dll
          gofmt -w client/scbl-process-router/main.go
          bash -n server/install_public_server.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'SCBL v0.6.2: integrate session, routing and 5th binary fixes'
          git push origin HEAD:scbl-v0.6.2-integration
