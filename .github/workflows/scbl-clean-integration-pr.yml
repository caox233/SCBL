name: Clean SCBL v0.6.2 integration branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  clean:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Clean generated integration state
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p=Path('server/install_public_server.sh')
          text=p.read_text(encoding='utf-8')
          first=text.find('github_asset_headers() {')
          second=text.find('github_asset_headers() {', first+1) if first >= 0 else -1
          if first >= 0 and second >= 0:
              text=text[:first]+text[second:]
          p.write_text(text,encoding='utf-8')

          p=Path('client/ScblPublicLauncher/Services/ProcessRouterService.cs')
          text=p.read_text(encoding='utf-8-sig')
          a=text.find('            if (intentional)')
          marker='            Interlocked.Increment(ref _unexpectedExitCount);'
          b=text.find(marker,a)
          if a >= 0 and b >= 0:
              block='''            if (intentional)
              {
                  _lastExitReason = "intentional";
                  WriteGuardHealthSnapshot("stopped");
                  return;
              }

              bool normalGameEnd;
              lock (_sessionSync)
              {
                  normalGameEnd = exitCode == 0
                      && !_allowEmptyGamePids
                      && !_gamePids.Any(IsProcessAlive);
              }
              if (normalGameEnd)
              {
                  _lastExitReason = "game process ended normally";
                  LogService.Info($"Process router exited normally after the launcher-owned game process ended. pid={pid}, exit={exitCode}");
                  WriteGuardHealthSnapshot("game-ended");
                  return;
              }

              Interlocked.Increment(ref _unexpectedExitCount);'''
              text=text[:a]+block+text[b+len(marker):]
          p.write_text(text,encoding='utf-8')
          PY
          rm -f SCBL_V062_APPLY_LOG.txt SCBL_V062_APPLY_V2_LOG.txt SCBL_V062_APPLY_V3_LOG.txt .github/SCBL_V062_TRIGGER.md
          bash -n server/install_public_server.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py
          gofmt -w client/scbl-process-router/main.go
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'SCBL v0.6.2: clean integration sources'
          git push origin HEAD:scbl-v0.6.2-integration
