name: Format SCBL Route Guard exit handler

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Normalize exit handler
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p = Path('client/ScblPublicLauncher/Services/ProcessRouterService.cs')
          text = p.read_text(encoding='utf-8-sig')
          start = text.find('            if (intentional)')
          marker = '            Interlocked.Increment(ref _unexpectedExitCount);'
          end = text.find(marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Route Guard exit handler anchor not found')
          block = '''            if (intentional)
            {
                _lastExitReason = "intentional";
                WriteGuardHealthSnapshot("stopped");
                return;
            }

            bool normalGameEnd;
            lock (_sessionSync)
            {
                normalGameEnd = exitCode == 0
                    && !_allowEmptyGamePids
                    && !_gamePids.Any(IsProcessAlive);
            }
            if (normalGameEnd)
            {
                _lastExitReason = "game process ended normally";
                LogService.Info($"Process router exited normally after the launcher-owned game process ended. pid={pid}, exit={exitCode}");
                WriteGuardHealthSnapshot("game-ended");
                return;
            }

            Interlocked.Increment(ref _unexpectedExitCount);'''
          text = text[:start] + block + text[end + len(marker):]
          p.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add client/ScblPublicLauncher/Services/ProcessRouterService.cs
          if ! git diff --cached --quiet; then
            git commit -m 'router: normalize normal game-exit handling'
            git push origin HEAD:scbl-v0.6.2-integration
          fi
