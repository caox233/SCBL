name: Add SCBL terminal guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Add terminal guard
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server/install_public_server.sh')
          text=p.read_text(encoding='utf-8')
          if 'setup_terminal()' not in text:
              start=text.find('if [[ $EUID -ne 0 ]]; then')
              end=text.find('\nfi',start)
              if start < 0 or end < 0: raise SystemExit('root block not found')
              end += len('\nfi')
              block='''

          SCBL_ORIGINAL_STTY=""
          setup_terminal() {
            [[ -t 0 ]] || return 0
            SCBL_ORIGINAL_STTY="$(stty -g 2>/dev/null || true)"
            stty -ixon 2>/dev/null || true
          }
          restore_terminal() {
            [[ -t 0 && -n "${SCBL_ORIGINAL_STTY:-}" ]] || return 0
            stty "$SCBL_ORIGINAL_STTY" 2>/dev/null || true
          }
          trap restore_terminal EXIT
          setup_terminal'''
              text=text[:end]+block+text[end:]
          p.write_text(text,encoding='utf-8')
          PY
          bash -n server/install_public_server.sh
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server/install_public_server.sh
          git commit -m 'server: guard manager terminal flow control state'
          git push origin HEAD:scbl-v0.6.2-integration
