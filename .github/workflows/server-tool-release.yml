name: Publish SCBL server tool

on:
  push:
    branches: [main]
    paths:
      - VERSION_SERVER_TOOL
      - server/**
      - scripts/install-server.sh
      - .github/workflows/server-tool-release.yml
  workflow_dispatch:
    inputs:
      version:
        description: Server tool version; leave empty to use VERSION_SERVER_TOOL
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: scbl-server-tool-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply v0.6.6 stable IPv6 selector source hotfix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          version = "0.6.6"
          manager_path = Path("server/install_public_server.sh")
          text = manager_path.read_text(encoding="utf-8")

          if 'SERVER_TOOL_VERSION="0.6.5"' in text:
              text = text.replace('SERVER_TOOL_VERSION="0.6.5"', f'SERVER_TOOL_VERSION="{version}"', 1)

          helper_start = "  cat > /usr/local/sbin/scbl-public-ipv6 <<'IPV6EOF'\n"
          start = text.index(helper_start)
          end = text.index("IPV6EOF\n", start + len(helper_start)) + len("IPV6EOF\n")

          new_helper = r'''  cat > /usr/local/sbin/scbl-public-ipv6 <<'IPV6EOF'
#!/usr/bin/env bash
set -euo pipefail

OVERRIDE_FILE="/etc/scbl-public/ddns-ipv6-address"
IFACE_FILE="/etc/scbl-public/ddns-ipv6-interface"
PROBE="2606:4700:4700::1111"

validate_and_print() {
  python3 - "$1" <<'PYEOF_VALIDATE_IPV6'
import ipaddress
import sys

try:
    value = ipaddress.IPv6Address(sys.argv[1].strip())
except Exception:
    raise SystemExit(1)
if not value.is_global:
    raise SystemExit(1)
print(value.compressed)
PYEOF_VALIDATE_IPV6
}

if [[ -s "$OVERRIDE_FILE" ]]; then
  override="$(head -n 1 "$OVERRIDE_FILE" | tr -d '[:space:]')"
  validate_and_print "$override"
  exit 0
fi

iface="${1:-}"
if [[ -z "$iface" && -s "$IFACE_FILE" ]]; then
  iface="$(head -n 1 "$IFACE_FILE" | tr -d '[:space:]')"
fi
if [[ -z "$iface" ]]; then
  iface="$(ip -6 route get "$PROBE" 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="dev") {print $(i+1); exit}}')"
fi
if [[ -z "$iface" ]]; then
  iface="$(ip -6 route show default 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="dev") {print $(i+1); exit}}')"
fi
[[ -n "$iface" ]] || exit 1

python3 - "$iface" "$PROBE" <<'PYEOF_SELECT_STABLE_IPV6'
import ipaddress
import json
import subprocess
import sys

iface, probe = sys.argv[1:3]

def run(*args):
    try:
        return subprocess.check_output(args, text=True, stderr=subprocess.DEVNULL).strip()
    except Exception:
        return ""

route_text = run("ip", "-6", "route", "get", probe)
route_src = None
fields = route_text.split()
if "src" in fields:
    try:
        route_src = ipaddress.IPv6Address(fields[fields.index("src") + 1])
    except Exception:
        route_src = None

raw = run("ip", "-j", "-6", "addr", "show", "dev", iface, "scope", "global")
try:
    interfaces = json.loads(raw or "[]")
except Exception:
    interfaces = []

candidates = []
for interface in interfaces:
    for info in interface.get("addr_info", []):
        if info.get("family") != "inet6" or info.get("scope") != "global":
            continue
        try:
            address = ipaddress.IPv6Address(str(info.get("local", "")))
        except Exception:
            continue
        if not address.is_global:
            continue

        flags = {str(item).lower() for item in info.get("flags", [])}
        for key in ("temporary", "secondary", "deprecated", "tentative", "dadfailed"):
            if info.get(key):
                flags.add(key)
        if flags & {"temporary", "secondary", "deprecated", "tentative", "dadfailed"}:
            continue
        if info.get("preferred_life_time") == 0:
            continue

        score = 0
        if info.get("mngtmpaddr") or "mngtmpaddr" in flags:
            score += 500
        if not info.get("dynamic") and "dynamic" not in flags:
            score += 300
        if str(info.get("preferred_life_time", "")) == "forever":
            score += 100
        if route_src is not None:
            if address == route_src:
                score += 80
            try:
                if address in ipaddress.IPv6Network(f"{route_src}/64", strict=False):
                    score += 200
            except Exception:
                pass

        prefixlen = int(info.get("prefixlen", 128) or 128)
        candidates.append((score, -prefixlen, -int(address), address))

if not candidates:
    raise SystemExit(1)

candidates.sort(reverse=True)
print(candidates[0][3].compressed)
PYEOF_SELECT_STABLE_IPV6
IPV6EOF
'''

          text = text[:start] + new_helper + text[end:]

          function_anchor = 'write_ddns_go_ip_helpers() {\n  install -d -m 0755 /usr/local/sbin\n'
          function_replacement = '''write_ddns_go_ip_helpers() {
  install -d -m 0755 /usr/local/sbin /etc/scbl-public
  if [[ -n "${SCBL_WAN_IFACE:-}" ]]; then
    printf '%s\\n' "$SCBL_WAN_IFACE" > /etc/scbl-public/ddns-ipv6-interface
    chmod 0644 /etc/scbl-public/ddns-ipv6-interface
  fi
'''
          if function_anchor in text:
              text = text.replace(function_anchor, function_replacement, 1)

          manager_path.write_text(text, encoding="utf-8")
          Path("VERSION_SERVER_TOOL").write_text(version + "\n", encoding="utf-8")

          component_path = Path("COMPONENT_VERSIONS.json")
          component = json.loads(component_path.read_text(encoding="utf-8"))
          component["serverToolVersion"] = version
          component_path.write_text(json.dumps(component, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          changelog_path = Path("CHANGELOG.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          section = '''## Server Tool v0.6.6

- 修复 Ubuntu Server 同时存在多个全局 IPv6 地址时，DDNS 直接选取第一条地址的问题。
- 优先选择默认出口接口上的稳定 SLAAC 基础地址，排除 temporary、secondary、deprecated、tentative 和 dadfailed 地址。
- 支持通过 `/etc/scbl-public/ddns-ipv6-address` 固定指定 DDNS IPv6，通过 `/etc/scbl-public/ddns-ipv6-interface` 固定接口。
- 同时包含管道安装入口修复：`curl | bash` 只安装 `SCBL` 命令，不再在管道内强行启动交互菜单。

'''
          if "## Server Tool v0.6.6" not in changelog:
              changelog = changelog.replace("# 更新记录\n\n", "# 更新记录\n\n" + section, 1)
              changelog_path.write_text(changelog, encoding="utf-8")

          notes_path = Path("docs/releases/SERVER_TOOL_v0.6.6.md")
          notes_path.parent.mkdir(parents=True, exist_ok=True)
          notes_path.write_text('''# SCBL Server Tool v0.6.6

This server-tool-only release does not rebuild or change the Windows client.

## Changes

- Selects a stable preferred global IPv6 address instead of the first address returned by `ip`.
- Rejects temporary, secondary, deprecated, tentative and DAD-failed IPv6 addresses.
- Prefers the stable SLAAC base address on the configured WAN/default-route interface.
- Adds fixed address and interface overrides under `/etc/scbl-public/`.
- Keeps the pipe-safe bootstrap behavior and preserves existing SCBL data and DDNS-GO configuration.
''', encoding="utf-8")
          PY

          bash -n server/install_public_server.sh
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('server/install_public_server.sh')
          text = path.read_text(encoding='utf-8')
          for marker, source in re.findall(r"<<'?(PYEOF_[A-Za-z0-9_]+)'?\n(.*?)\n\1", text, re.S):
              compile(source, f'{path}:{marker}', 'exec')
          PY

          if ! git diff --quiet; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add server/install_public_server.sh VERSION_SERVER_TOOL COMPONENT_VERSIONS.json CHANGELOG.md docs/releases/SERVER_TOOL_v0.6.6.md
            git commit -m "SCBL Server Tool v0.6.6: stable IPv6 DDNS selection"
            git push origin HEAD:main
          fi

      - id: version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(tr -d '\r\n ' < VERSION_SERVER_TOOL)"
          requested='${{ inputs.version }}'
          requested="${requested#v}"
          [[ -n "$requested" ]] || requested="$source_version"
          [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          grep -Fq "SERVER_TOOL_VERSION=\"$requested\"" server/install_public_server.sh
          echo "version=$requested" >> "$GITHUB_OUTPUT"
          echo "tag=server-tool-v$requested" >> "$GITHUB_OUTPUT"

      - name: Validate and package server tool
        shell: bash
        run: |
          set -euo pipefail
          version='${{ steps.version.outputs.version }}'
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 -m py_compile server/scbl_control_plane.py server/test_control_plane.py
          python3 server/test_control_plane.py

          root="SCBL-Server-Tool-v${version}-linux-x86_64"
          mkdir -p "stage/$root/THIRD_PARTY_LICENSES" dist
          cp server/install_public_server.sh \
             server/scbl_control_plane.py \
             server/check_scbl_binary_release.sh \
             server/5th-echelon_branch.txt \
             scripts/install-server.sh \
             VERSION_SERVER_TOOL VERSION_CLIENT COMPONENT_VERSIONS.json \
             README.md CHANGELOG.md THIRD_PARTY_NOTICES.md \
             "stage/$root/"
          cp THIRD_PARTY_LICENSES/EasyTier-LGPL-3.0.txt "stage/$root/THIRD_PARTY_LICENSES/"
          chmod 0755 "stage/$root/install_public_server.sh" \
                     "stage/$root/install-server.sh" \
                     "stage/$root/check_scbl_binary_release.sh"

          package="${root}.tar.gz"
          tar -C stage -czf "dist/$package" "$root"
          cp "dist/$package" dist/SCBL-Server-Tool-latest-linux-x86_64.tar.gz
          cp scripts/install-server.sh dist/install-server.sh

          for file in dist/*.tar.gz; do
            hash="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$file")" > "${file}.sha256"
          done
          package_sha="$(sha256sum "dist/$package" | awk '{print $1}')"
          cat > dist/server-tool-release-manifest.json <<JSON
          {
            "schemaVersion": 2,
            "component": "server-tool",
            "product": "SCBL",
            "channel": "stable",
            "version": "${version}",
            "file": "${package}",
            "sha256": "${package_sha}",
            "latestAlias": "SCBL-Server-Tool-latest-linux-x86_64.tar.gz",
            "controlApiVersion": 1,
            "minimumClientVersion": "0.6.0",
            "preserves": [
              "scbl.env",
              "server/5th-echelon.db",
              "client-updates",
              "incoming",
              "backups",
              "DDNS-GO configuration"
            ]
          }
          JSON
          (cd dist && sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort) > SHA256SUMS.txt)

      - uses: actions/upload-artifact@v4
        with:
          name: scbl-server-tool-release
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: scbl-server-tool-release
          path: dist
      - name: Publish immutable and rolling server-tool releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.build.outputs.version }}'
          tag='${{ needs.build.outputs.tag }}'
          notes="docs/releases/SERVER_TOOL_v${version}.md"
          git fetch origin main
          git checkout origin/main -- "$notes"
          test -f "$notes"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --title "SCBL Server Tool v${version}" --notes-file "$notes" --latest=false
          else
            gh release create "$tag" dist/* --title "SCBL Server Tool v${version}" --notes-file "$notes" --latest=false --target main
          fi

          git tag -f server-tool-stable-latest origin/main
          git push origin refs/tags/server-tool-stable-latest --force
          if gh release view server-tool-stable-latest >/dev/null 2>&1; then
            while read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset server-tool-stable-latest "$asset" -y
            done < <(gh release view server-tool-stable-latest --json assets --jq '.assets[].name')
            gh release edit server-tool-stable-latest \
              --title "SCBL Server Tool Stable v${version}" \
              --notes-file "$notes" \
              --latest=false
            gh release upload server-tool-stable-latest dist/*
          else
            gh release create server-tool-stable-latest dist/* \
              --title "SCBL Server Tool Stable v${version}" \
              --notes-file "$notes" \
              --latest=false \
              --target main
          fi
