name: Verify build and release optimization

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/verify-build-release-optimization.yml'

permissions:
  contents: read

jobs:
  full-windows-client:
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true
          cache-dependency-path: client/scbl-process-router/go.sum
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: verify-nuget-${{ runner.os }}-${{ hashFiles('client/**/*.csproj', 'client/**/*.props', 'client/**/*.targets') }}
          restore-keys: verify-nuget-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            client/easytier/bin
            client/easytier/cache
            client/scbl-process-router/WinDivert.dll
            client/scbl-process-router/WinDivert64.sys
          key: verify-runtime-${{ runner.os }}-${{ hashFiles('client/easytier/download_easytier_windows.ps1', 'client/scbl-process-router/download_windivert.ps1') }}
      - uses: actions/cache@v4
        with:
          path: client/ScblPublicLauncher/EmbeddedFiles/uplay_r1_loader.dll
          key: verify-hooks-${{ hashFiles('client/ScblPublicLauncher/EmbeddedFiles/SCBL_EMBEDDED_SHA256.txt') }}
      - name: Full clean build and direct ZIP package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\client\build_all_windows.ps1 -Fast -Clean -Package -OutputDir "$env:GITHUB_WORKSPACE\dist"
          $zip = @(Get-ChildItem .\dist\SCBL-Client-v*-win-x86.zip)
          if ($zip.Count -ne 1) { throw "Expected one client ZIP, found $($zip.Count)." }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [IO.Compression.ZipFile]::OpenRead($zip[0].FullName)
          try {
            $names = @($archive.Entries | ForEach-Object FullName)
            foreach ($required in @('SplinterCellCNLauncher.exe','SCBL.Updater.exe','tools/easytier-core.exe','tools/easytier-cli.exe','tools/scbl-process-router.exe')) {
              if ($names -notcontains $required) { throw "ZIP is missing $required" }
            }
            if ($names | Where-Object { $_ -match '^(logs|updates|backup)/' -or $_ -eq 'launcher_settings.json' }) {
              throw 'ZIP contains local runtime data.'
            }
          }
          finally { $archive.Dispose() }
          Get-FileHash $zip[0].FullName -Algorithm SHA256

  server-routing-package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate server routing and package shape
        shell: bash
        run: |
          set -euo pipefail
          bash -n server/install_public_server.sh
          bash -n scripts/install-server.sh
          python3 server/test_release_manifest_routing.py
          version="$(tr -d '\r\n ' < VERSION_SERVER_TOOL)"
          root="SCBL-Server-Tool-v${version}-linux-x86_64"
          mkdir -p "stage/$root"
          cp server/install_public_server.sh scripts/install-server.sh "stage/$root/"
          tar -C stage -czf /tmp/server-tool.tar.gz "$root"
          tar -tzf /tmp/server-tool.tar.gz | grep -Fq "$root/install_public_server.sh"
          tar -tzf /tmp/server-tool.tar.gz | grep -Fq "$root/install-server.sh"
