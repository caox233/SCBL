name: Verify SCBL v0.6.3 component releases

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-v0.6.3-releases.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download and verify component releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/scbl-client-release /tmp/scbl-server-release

          download_release() {
            local tag="$1" target="$2"
            local attempt
            for attempt in $(seq 1 30); do
              rm -rf "$target"/*
              if gh release download "$tag" --repo '${{ github.repository }}' --dir "$target"; then
                return 0
              fi
              echo "等待 Release $tag 完成，重试 ${attempt}/30..."
              sleep 10
            done
            return 1
          }

          download_release client-v0.6.3 /tmp/scbl-client-release
          download_release server-tool-v0.6.3 /tmp/scbl-server-release

          client=/tmp/scbl-client-release
          server=/tmp/scbl-server-release
          test -f "$client/SCBL-Client-v0.6.3-win-x86.zip"
          test -f "$client/SCBL-Client-v0.6.3-win-x86.zip.sha256"
          test -f "$client/client-release-manifest.json"
          test -f "$client/SHA256SUMS.txt"
          test -f "$server/SCBL-Server-Tool-v0.6.3-linux-x86_64.tar.gz"
          test -f "$server/SCBL-Server-Tool-v0.6.3-linux-x86_64.tar.gz.sha256"
          test -f "$server/SCBL-Server-Tool-latest-linux-x86_64.tar.gz"
          test -f "$server/SCBL-Server-Tool-latest-linux-x86_64.tar.gz.sha256"
          test -f "$server/server-tool-release-manifest.json"
          test -f "$server/install-server.sh"
          test -f "$server/SHA256SUMS.txt"

          (cd "$client" && sha256sum -c SHA256SUMS.txt)
          (cd "$server" && sha256sum -c SHA256SUMS.txt)

          python3 - "$client/client-release-manifest.json" "$server/server-tool-release-manifest.json" <<'PY'
          import json
          import sys

          client = json.load(open(sys.argv[1], encoding='utf-8'))
          server = json.load(open(sys.argv[2], encoding='utf-8'))
          assert client['component'] == 'client'
          assert client['version'] == '0.6.3'
          assert client['file'] == 'SCBL-Client-v0.6.3-win-x86.zip'
          assert server['component'] == 'server-tool'
          assert server['version'] == '0.6.3'
          assert server['file'] == 'SCBL-Server-Tool-v0.6.3-linux-x86_64.tar.gz'
          assert client['controlApiVersion'] == server['controlApiVersion'] == 1
          PY

          client_sha="$(sha256sum "$client/SCBL-Client-v0.6.3-win-x86.zip" | awk '{print $1}')"
          server_sha="$(sha256sum "$server/SCBL-Server-Tool-v0.6.3-linux-x86_64.tar.gz" | awk '{print $1}')"
          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cat > .github/SCBL_V0.6.3_RELEASE_STATUS.md <<EOF
          # SCBL v0.6.3 component Release verification

          - Windows client Release: **client-v0.6.3**
          - Windows client SHA256: \`${client_sha}\`
          - Server tool Release: **server-tool-v0.6.3**
          - Server tool SHA256: \`${server_sha}\`
          - Control API version: **1**
          - Verification: **passed**
          - Verified at (UTC): **${verified_at}**
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/SCBL_V0.6.3_RELEASE_STATUS.md
          git commit -m 'ci: record verified v0.6.3 component releases'
          git push origin HEAD:main
