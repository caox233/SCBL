name: Final complete v1 client package verification

# Hooks is verified before compilation and embedded into the launcher; it is not a standalone package file.
on:
  push:
    branches: [agent/release-v1.0.0]
    paths:
      - '.github/workflows/verify3-v1-full-package.yml'

permissions:
  contents: read

concurrency:
  group: scbl-v1-full-package-final
  cancel-in-progress: true

jobs:
  verify-client-package:
    runs-on: windows-2022
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true
          cache-dependency-path: client/scbl-process-router/go.sum
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('client/**/*.csproj', 'client/**/*.props', 'client/**/*.targets') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            client/easytier/bin
            client/easytier/cache
            client/scbl-process-router/WinDivert.dll
            client/scbl-process-router/WinDivert64.sys
          key: client-runtime-${{ runner.os }}-${{ hashFiles('client/easytier/download_easytier_windows.ps1', 'client/scbl-process-router/download_windivert.ps1') }}
      - uses: actions/cache@v4
        with:
          path: client/ScblPublicLauncher/EmbeddedFiles/uplay_r1_loader.dll
          key: hooks-win-x86-${{ hashFiles('client/ScblPublicLauncher/EmbeddedFiles/SCBL_EMBEDDED_SHA256.txt') }}
      - name: Build and inspect v1.0.0 package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content .\VERSION_CLIENT -Raw).Trim()
          if ($version -ne '1.0.0') { throw "Unexpected client version: $version" }
          .\client\build_all_windows.ps1 -Fast -Package -OutputDir "$env:GITHUB_WORKSPACE\dist"
          $zip = Join-Path $env:GITHUB_WORKSPACE "dist\SCBL-Client-v$version-win-x86.zip"
          if (-not (Test-Path $zip)) { throw "Missing client package: $zip" }
          $extract = Join-Path $env:RUNNER_TEMP 'scbl-v1-package'
          if (Test-Path $extract) { Remove-Item $extract -Recurse -Force }
          Expand-Archive -LiteralPath $zip -DestinationPath $extract -Force
          $requiredNames = @(
            'SplinterCellCNLauncher.exe',
            'SCBL.Updater.exe',
            'SCBL.Updater.payload.exe',
            'scbl-process-router.exe',
            'easytier-core.exe',
            'easytier-cli.exe',
            'WinDivert.dll',
            'WinDivert64.sys'
          )
          $found = @{}
          foreach ($name in $requiredNames) {
            $item = Get-ChildItem $extract -Recurse -Filter $name | Select-Object -First 1
            if ($null -eq $item) { throw "Client package is missing: $name" }
            $found[$name] = $item
          }
          foreach ($name in @('SplinterCellCNLauncher.exe','SCBL.Updater.exe')) {
            $info = (Get-Item $found[$name].FullName).VersionInfo
            if (-not $info.FileVersion.StartsWith('1.0.0')) { throw "$name FileVersion is $($info.FileVersion)" }
            if (-not $info.ProductVersion.StartsWith('1.0.0')) { throw "$name ProductVersion is $($info.ProductVersion)" }
          }
          $relative = Get-ChildItem $extract -Recurse -Force | ForEach-Object { $_.FullName.Substring($extract.Length).TrimStart('\').Replace('\','/') }
          foreach ($name in @('launcher_settings.json','client_update_manifest.json','update_manifest.json')) {
            if ($relative | Where-Object { $_ -ieq $name -or $_ -imatch "(^|/)$([regex]::Escape($name))$" }) { throw "Package contains local/update metadata: $name" }
          }
          foreach ($folder in @('logs','backup','updates')) {
            if ($relative | Where-Object { $_ -imatch "(^|/)$folder(/|$)" }) { throw "Package contains local folder: $folder" }
          }
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "Verified $([IO.Path]::GetFileName($zip)) SHA256=$hash"
