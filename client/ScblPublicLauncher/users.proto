syntax = "proto3";

option csharp_namespace = "SplinterCellCNLauncher.Network";

package users;

service Users {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string error = 1;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string ubi_id = 3;
}

message RegisterResponse {
  string error = 1;
}
